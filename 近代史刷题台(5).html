<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- 中国近代史纲要 · 刷题台（知识库 + 历史地图 + AI） -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>近代史纲要 · 刷题台</title>
<style>
  :root{
    --paper:#efe8d9; --panel:#faf6ec; --panel2:#f4eedf;
    --ink:#211c16; --ink2:#5b5247; --faint:#8c8170;
    --seal:#a8272b; --seal-d:#7f1d20; --seal-soft:#f1d9d6;
    --jade:#2f6b4f; --jade-soft:#dbe9e0;
    --gold:#8a6d3b; --line:#d8cdb6; --line2:#e6ddc9;
    --water:#cfe0e6; --water2:#bcd3db; --land:#e9e0cb; --land-edge:#b9a87f;
    --shadow:0 1px 0 #fff8 inset, 0 8px 24px -14px #5b524733;
    --serif:"Noto Serif SC","Songti SC","STSong",STZhongsong,SimSun,"Source Han Serif SC",serif;
    --sans:"Noto Sans SC","PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow-x:clip}
  body{
    background:
      radial-gradient(1200px 600px at 110% -10%, #f7f1e4, transparent 60%),
      radial-gradient(900px 500px at -10% 120%, #ece3d0, transparent 55%),
      var(--paper);
    color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--seal-soft)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .wrap{max-width:1320px;margin:0 auto;padding:18px 18px 96px}

  header.mast{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;
    padding:6px 4px 16px;border-bottom:2px solid var(--ink);margin-bottom:18px}
  .seal-logo{width:46px;height:46px;border-radius:8px;background:var(--seal);
    color:#fff;display:grid;place-items:center;font-family:var(--serif);
    font-weight:700;font-size:22px;box-shadow:0 6px 16px -8px var(--seal-d);
    border:1px solid var(--seal-d);transform:rotate(-2deg)}
  .mast h1{font-family:var(--serif);font-weight:700;font-size:25px;margin:0;letter-spacing:.04em}
  .mast .sub{color:var(--ink2);font-size:13px;margin-top:2px}
  .mast .grow{flex:1}
  .stat{font-family:var(--serif);text-align:right;line-height:1.15}
  .stat b{font-size:22px;color:var(--seal)}
  .stat span{display:block;font-size:11px;color:var(--faint);font-family:var(--sans);letter-spacing:.1em}

  .grid{display:grid;grid-template-columns:1fr 412px;gap:20px;align-items:start}
  .grid>*{min-width:0}
  @media(max-width:1040px){ .grid{grid-template-columns:1fr} }

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px 14px;margin-bottom:14px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{padding:7px 15px;border-radius:8px;font-size:14px;color:var(--ink2);font-family:var(--serif)}
  .seg button.on{background:var(--seal);color:#fff;box-shadow:0 4px 12px -6px var(--seal-d)}
  select{font-family:var(--sans);font-size:14px;padding:8px 12px;border:1px solid var(--line);
    border-radius:9px;background:var(--panel2);color:var(--ink);max-width:100%;min-width:0;
    text-overflow:ellipsis}
  .controls>*{min-width:0}
  .mini{font-size:12.5px;padding:7px 11px;border:1px solid var(--line);border-radius:9px;
    background:var(--panel2);color:var(--ink2)}
  .mini:hover{border-color:var(--seal);color:var(--seal)}
  .grow{flex:1}

  .qbox{padding:22px 24px 18px}
  .qmeta{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12.5px;margin-bottom:12px;
    font-family:var(--serif);letter-spacing:.08em;flex-wrap:wrap}
  .qmeta .tag{background:var(--panel2);border:1px solid var(--line);padding:2px 9px;border-radius:20px;color:var(--ink2)}
  .qmeta .tag.red{color:var(--seal);border-color:var(--seal-soft);background:#fff}
  .qstem{font-size:18.5px;line-height:1.7;font-weight:500;margin:0 0 18px;font-family:var(--serif)}
  .qstem .num{color:var(--seal);font-weight:700;margin-right:8px}

  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);
    border-radius:11px;background:var(--panel2);transition:.12s;text-align:left;width:100%}
  .opt:hover:not(.locked){border-color:var(--seal);background:#fff}
  .opt .k{width:26px;height:26px;flex:none;border-radius:7px;background:#fff;border:1px solid var(--line);
    display:grid;place-items:center;font-family:var(--serif);font-weight:700;color:var(--ink2);font-size:14px}
  .opt .t{padding-top:1px}
  .opt.locked{cursor:default}
  .opt.right{border-color:var(--jade);background:var(--jade-soft)}
  .opt.right .k{background:var(--jade);color:#fff;border-color:var(--jade)}
  .opt.wrong{border-color:var(--seal);background:var(--seal-soft)}
  .opt.wrong .k{background:var(--seal);color:#fff;border-color:var(--seal)}
  .opt.dim{opacity:.55}

  .prerow{display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap}
  .prerow .tiny{color:var(--faint);font-size:12px}
  .hint-out{margin-top:12px;background:#fffdf6;border:1px solid var(--gold);border-left:3px solid var(--gold);
    border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;display:none}
  .hint-out.show{display:block;animation:fade .25s}
  .hint-out.load{font-style:italic;color:var(--faint);border-style:dashed}

  .exp{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px;display:none}
  .exp.show{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .exp .res{font-family:var(--serif);font-size:15px;margin-bottom:6px}
  .exp .res .ok{color:var(--jade);font-weight:700}
  .exp .res .no{color:var(--seal);font-weight:700}
  .exp .ans{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--gold);
    padding:11px 14px;border-radius:9px;color:var(--ink2);font-size:14px;margin:8px 0 12px}
  .ai-out{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;
    font-size:14px;line-height:1.75;white-space:pre-wrap;display:none}
  .ai-out.show{display:block}
  .ai-out.load{color:var(--faint);font-style:italic}

  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}
  .btn{padding:9px 16px;border-radius:10px;font-size:14px;font-family:var(--serif)}
  .btn.solid{background:var(--seal);color:#fff;box-shadow:0 5px 14px -7px var(--seal-d)}
  .btn.solid:hover{background:var(--seal-d)}
  .btn.ghost{border:1px solid var(--line);background:var(--panel2);color:var(--ink2)}
  .btn.ghost:hover{border-color:var(--seal);color:var(--seal)}
  .btn.ai{border:1px solid var(--seal);color:var(--seal);background:#fff}
  .btn.ai:hover{background:var(--seal);color:#fff}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  .sheet{padding:14px 16px;margin-top:14px}
  .sheet h3{font-family:var(--serif);font-size:14px;margin:0 0 10px;color:var(--ink2);
    display:flex;justify-content:space-between;align-items:center}
  .sheet .legend{font-size:11px;color:var(--faint);font-family:var(--sans);display:flex;gap:12px}
  .sheet .legend i{font-style:normal;display:inline-flex;align-items:center;gap:4px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .grid-n{display:flex;flex-wrap:wrap;gap:6px}
  .gn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);
    font-size:12.5px;color:var(--ink2);font-family:var(--serif)}
  .gn.cur{outline:2px solid var(--ink);outline-offset:1px}
  .gn.ok{background:var(--jade-soft);border-color:var(--jade);color:var(--jade)}
  .gn.no{background:var(--seal-soft);border-color:var(--seal);color:var(--seal)}

  /* ===== right column ===== */
  .rightcol{display:flex;flex-direction:column;gap:16px;position:sticky;top:14px}
  .rc-tabs{display:none}
  .know-card .head{padding:14px 16px 0}
  .chtitle{font-family:var(--serif);font-size:17px;font-weight:700}
  .chsub{color:var(--gold);font-size:12.5px;margin-top:2px;letter-spacing:.04em}
  .fullbadge{display:none;margin-top:8px;font-size:11.5px;color:var(--seal);background:var(--seal-soft);
    border:1px solid var(--seal-soft);padding:3px 9px;border-radius:20px;font-family:var(--serif)}
  .tabs{display:flex;gap:4px;padding:12px 12px 0}
  .tabs button{flex:1;padding:8px 4px;border-radius:9px 9px 0 0;font-size:13px;font-family:var(--serif);
    color:var(--ink2);border:1px solid transparent;border-bottom:none}
  .tabs button.on{background:var(--panel2);border-color:var(--line);color:var(--seal)}
  .pane{padding:14px 16px 18px;border-top:1px solid var(--line);max-height:46vh;overflow:auto}
  .pane::-webkit-scrollbar{width:7px}.pane::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  .ksec{margin-bottom:15px}
  .ksec h4{font-family:var(--serif);font-size:14.5px;margin:0 0 7px;color:var(--seal);
    display:flex;align-items:center;gap:7px}
  .ksec h4::before{content:"";width:8px;height:8px;background:var(--seal);transform:rotate(45deg);flex:none}
  .ksec ul{margin:0;padding-left:2px;list-style:none}
  .ksec li{position:relative;padding:4px 0 4px 16px;font-size:13.5px;color:var(--ink2);line-height:1.65}
  .ksec li::before{content:"";position:absolute;left:2px;top:11px;width:5px;height:5px;border-radius:50%;
    background:var(--gold)}

  .pp{display:flex;gap:10px;padding:9px 2px;border-bottom:1px dashed var(--line2);align-items:baseline}
  .pp:last-child{border-bottom:none}
  .pp-n{font-family:var(--serif);font-weight:700;color:var(--seal);font-size:14px;flex:none;min-width:74px}
  .pp-r{font-size:13px;color:var(--ink2);line-height:1.6}
  .empty{color:var(--faint);font-size:13px;padding:10px 2px}

  .tl{position:relative;margin:2px 0 0 4px;padding-left:4px}
  .tl::before{content:"";position:absolute;left:21px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(var(--line),var(--seal-soft),var(--line))}
  .ev{position:relative;padding:0 0 4px 56px;margin-bottom:4px}
  .ev .seal{position:absolute;left:0;top:1px;width:44px;height:44px;border-radius:50%;
    background:#fff;border:2px solid var(--seal);color:var(--seal);display:grid;place-items:center;
    font-family:var(--serif);font-weight:700;font-size:10.5px;line-height:1.05;text-align:center;
    box-shadow:0 4px 10px -6px var(--seal-d);cursor:pointer;transition:.14s;z-index:1;padding:2px}
  .ev .seal:hover{background:var(--seal);color:#fff;transform:scale(1.06)}
  .ev.open .seal{background:var(--seal);color:#fff}
  .ev .row{cursor:pointer;padding:8px 0 6px}
  .ev .ttl{font-family:var(--serif);font-weight:600;font-size:14.5px}
  .ev .hint{font-size:11.5px;color:var(--faint);margin-top:1px}
  .ev .detail{display:none;background:var(--panel2);border:1px solid var(--line);
    border-left:3px solid var(--seal);border-radius:9px;padding:10px 12px;margin:4px 0 8px;
    font-size:13px;color:var(--ink2);line-height:1.7}
  .ev.open .detail{display:block;animation:fade .2s}

  /* ===== 思考题 ===== */
  .essay-head{font-size:12px;color:var(--faint);margin:0 0 10px;font-family:var(--serif);line-height:1.6}
  .essay{border:1px solid var(--line);border-radius:10px;margin-bottom:9px;background:var(--panel2);overflow:hidden}
  .essay-q{display:flex;gap:9px;align-items:flex-start;width:100%;text-align:left;padding:11px 12px;font-family:var(--serif)}
  .essay-q:hover{background:#fff}
  .essay-q .eq-n{flex:none;width:22px;height:22px;border-radius:6px;background:var(--seal);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .essay-q .eq-t{flex:1;font-size:14px;font-weight:600;color:var(--ink);line-height:1.5}
  .essay-q .eq-ar{flex:none;color:var(--faint);transition:transform .2s;margin-top:2px}
  .essay.open .eq-ar{transform:rotate(90deg);color:var(--seal)}
  .essay-a{display:none;padding:0 13px 12px;border-top:1px solid var(--line);background:#fffdf8}
  .essay.open .essay-a{display:block;animation:fade .2s}
  .essay-a ul{margin:10px 0 0;padding-left:2px;list-style:none}
  .essay-a li{position:relative;padding:6px 0 6px 15px;font-size:13px;color:var(--ink2);line-height:1.72}
  .essay-a li::before{content:"";position:absolute;left:1px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--seal)}
  .essay-a .eframe{background:var(--seal-soft);border:1px solid #e7c7c4;border-radius:8px;padding:7px 10px;margin:10px 0 4px;font-size:12.5px;color:var(--seal-d);line-height:1.6;font-family:var(--serif)}
  .essay-a .eframe b{color:var(--seal)}
  .essay-a li .ek{color:var(--seal);font-weight:700;font-family:var(--serif);margin-right:3px}
  .essay-a li .ek::after{content:"——";color:var(--faint);font-weight:400;margin-left:2px}
  .cite{color:var(--gold);font-size:11px;margin-left:4px;white-space:nowrap}
  .essay-quiz{padding:0}
  .eq-tip{font-size:13px;color:var(--ink2);background:var(--jade-soft);border:1px dashed var(--jade);border-radius:9px;padding:10px 12px;margin-bottom:14px;font-family:var(--serif)}
  .essay-a.ans-open{display:block;border:1px solid var(--line);border-radius:10px;margin-top:0;background:#fffdf8}
  .gn.gn-essay{background:var(--jade-soft);border-color:var(--jade);color:var(--jade);font-family:var(--serif)}
  .gn.gn-essay.done{background:var(--jade);color:#fff}
  .ever-tabs{display:flex;gap:5px;margin:0 0 10px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .ever-tabs button{flex:1;font-size:12px;padding:6px 4px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--ink2);font-family:var(--serif)}
  .ever-tabs button.on{background:var(--seal);color:#fff;border-color:var(--seal)}
  .ever{display:none}.ever.ever-on{display:block}
  .ver-full{margin:6px 0 0;padding-left:2px;list-style:none}
  .ver-full li{position:relative;padding:6px 0 6px 15px;font-size:12.5px;color:var(--ink2);line-height:1.7}
  .ver-full li::before{content:"";position:absolute;left:1px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
  .ver-org-list{margin:6px 0 0;padding-left:2px;list-style:none}
  .ver-org-list li{position:relative;padding:7px 0 7px 16px;font-size:12.5px;color:var(--ink2);line-height:1.76;border-bottom:1px dashed var(--line2)}
  .ver-org-list li:last-child{border-bottom:none}
  .ver-org-list li::before{content:"";position:absolute;left:2px;top:13px;width:5px;height:5px;background:var(--jade);transform:rotate(45deg)}

  /* ===== map ===== */
  .map-card{overflow:hidden}
  .map-head{display:flex;align-items:center;gap:8px;padding:13px 14px 10px;flex-wrap:wrap}
  .map-head b{font-family:var(--serif);font-size:15px}
  .map-head .ms{font-size:11.5px;color:var(--faint)}
  .map-head .tools{margin-left:auto;display:flex;gap:6px}
  .tlbtn{font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink2);font-family:var(--serif)}
  .tlbtn.on{background:var(--seal);color:#fff;border-color:var(--seal)}
  .mapwrap{position:relative;height:360px;background:linear-gradient(160deg,var(--water),var(--water2));
    border-top:1px solid var(--line);touch-action:none;overflow:hidden;cursor:grab}
  .mapwrap:active{cursor:grabbing}
  #map{width:100%;height:100%;display:block}
  .grat{stroke:#ffffff66;stroke-width:.6;stroke-dasharray:3 4}
  .land{fill:var(--land);stroke:var(--land-edge);stroke-width:1.1;stroke-linejoin:round}
  .river{fill:none;stroke:#7fa9c9;stroke-width:1.3;opacity:.8;stroke-linecap:round;stroke-linejoin:round}
  .sea{fill:#5f8294;font-size:12px;font-family:var(--serif);opacity:.75;letter-spacing:2px}
  .nei{fill:#9c917b;font-size:11px;font-family:var(--serif);opacity:.6;letter-spacing:1px}
  .mk{cursor:pointer}
  .mkring{opacity:.28}
  .mkdot{stroke:#fff;stroke-width:1}
  .mk:hover .mkring{opacity:.5}
  .mklbl{fill:var(--ink);font-family:var(--sans);paint-order:stroke;stroke:#fdfaf2;stroke-width:2.4px;font-weight:600}
  .mkcount{fill:#fff;text-anchor:middle;dominant-baseline:middle;font-family:var(--sans);font-weight:700}
  .mk.faded{opacity:.32}
  .arr{stroke:#7f1d20;opacity:.78;stroke-linecap:round}
  .arrh{fill:#7f1d20;opacity:.85}
  .map-ctrl{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:5px}
  .map-ctrl button{width:30px;height:30px;border-radius:8px;background:#fffffff0;border:1px solid var(--line);
    font-size:17px;color:var(--ink2);font-family:var(--serif);box-shadow:0 3px 8px -4px #0004;line-height:1}
  .map-ctrl button:hover{color:var(--seal);border-color:var(--seal)}
  .map-legend{position:absolute;left:10px;top:10px;background:#fffffff0;border:1px solid var(--line);
    border-radius:9px;padding:7px 9px;max-width:60%;font-size:11px;display:none;max-height:78%;overflow:auto}
  .map-legend.show{display:block}
  .map-legend .lg{display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;border-radius:5px}
  .map-legend .lg:hover{background:var(--panel2)}
  .map-legend .lg.off{opacity:.4}
  .map-legend .sw{width:10px;height:10px;border-radius:50%;flex:none}
  .map-pop{position:absolute;z-index:5;width:248px;max-width:84%;background:#fff;border:1px solid var(--line);
    border-radius:11px;box-shadow:0 14px 36px -16px #0007;display:none;overflow:hidden}
  .map-pop.show{display:block;animation:fade .15s}
  .pop-h{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;
    background:var(--panel2);border-bottom:1px solid var(--line)}
  .pop-h b{font-family:var(--serif);font-size:14px}
  .pop-x{font-size:16px;color:var(--faint);width:24px;height:24px;border-radius:6px}
  .pop-x:hover{background:#fff;color:var(--seal)}
  .pop-b{max-height:230px;overflow:auto;padding:6px 12px 10px}
  .pop-ev{display:flex;gap:9px;padding:8px 0;border-bottom:1px dashed var(--line2)}
  .pop-ev:last-child{border-bottom:none}
  .pop-d{flex:none;align-self:flex-start;color:#fff;font-family:var(--serif);font-size:11px;font-weight:700;
    padding:2px 7px;border-radius:14px;white-space:nowrap}
  .pop-t{font-family:var(--serif);font-weight:600;font-size:13.5px;line-height:1.4}
  .pop-ch{font-style:normal;font-size:10.5px;color:var(--faint);font-weight:400;margin-left:4px}
  .pop-x2{font-size:12.5px;color:var(--ink2);line-height:1.6;margin-top:2px}

  /* ===== floating AI ===== */
  .fab{position:fixed;right:20px;bottom:20px;z-index:40;width:56px;height:56px;border-radius:50%;
    background:var(--seal);color:#fff;font-family:var(--serif);font-size:13px;font-weight:700;
    box-shadow:0 12px 26px -10px var(--seal-d);border:1px solid var(--seal-d);line-height:1.1}
  .fab:hover{background:var(--seal-d)}
  .drawer{position:fixed;inset:0 0 0 auto;width:min(420px,100vw);z-index:50;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-20px 0 50px -30px #0006;transform:translateX(101%);
    transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .drawer .dh{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .drawer .dh b{font-family:var(--serif);font-size:16px}
  .drawer .dh .x{margin-left:auto;font-size:20px;color:var(--faint);width:30px;height:30px;border-radius:8px}
  .drawer .dh .x:hover{background:var(--panel2);color:var(--ink)}
  .prov{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--line2);align-items:center;flex-wrap:wrap}
  .prov .lab{font-size:12px;color:var(--faint)}
  .prov button{font-size:12.5px;padding:5px 11px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink2)}
  .prov button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .keyrow{padding:0 16px 10px;border-bottom:1px solid var(--line2);display:none}
  .keyrow.show{display:block}
  .keyrow input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;
    background:#fff;font-size:12.5px;font-family:var(--sans)}
  .keyrow .tip{font-size:11px;color:var(--faint);margin-top:5px}
  .chatlog{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;padding:11px 13px;border-radius:12px;font-size:13.5px;line-height:1.7;white-space:pre-wrap}
  .msg.u{align-self:flex-end;background:var(--seal);color:#fff;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg.sys{align-self:center;font-size:11.5px;color:var(--faint);background:none;text-align:center}
  .chatin{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px}
  .chatin textarea{flex:1;resize:none;height:42px;max-height:120px;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;font-family:var(--sans);font-size:13.5px;background:#fff}
  .chatin .send{padding:0 16px;border-radius:10px;background:var(--seal);color:#fff;font-family:var(--serif)}
  .quickrow{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap}
  .quickrow button{font-size:11.5px;padding:5px 9px;border-radius:14px;border:1px solid var(--line);
    background:#fff;color:var(--ink2)}
  .quickrow button:hover{border-color:var(--seal);color:var(--seal)}

  .scrim{position:fixed;inset:0;background:#2118;z-index:45;opacity:0;pointer-events:none;transition:.25s}
  .scrim.on{opacity:1;pointer-events:auto}

  .result{padding:18px 22px;margin-bottom:14px;display:none;align-items:center;gap:16px;border-left:4px solid var(--seal)}
  .result.show{display:flex}
  .result .big{font-family:var(--serif);font-size:30px;color:var(--seal);font-weight:700}
  .result .lbl{color:var(--ink2);font-size:13px}

  .sidetoggle{display:none}
  .closebar{display:none}

  /* ===== phone ===== */
  @media(max-width:1040px){
    .sidetoggle{display:inline-flex}
    .rightcol{position:fixed;inset:0;z-index:46;background:var(--paper);
      opacity:0;visibility:hidden;transform:translateY(14px);pointer-events:none;
      transition:opacity .24s,transform .24s,visibility .24s;
      overflow:auto;padding:12px;gap:12px;border-radius:0}
    .rightcol.open{opacity:1;visibility:visible;transform:none;pointer-events:auto}
    .rc-tabs{display:flex;gap:6px;position:sticky;top:0;z-index:2;background:var(--paper);padding:2px 0 8px}
    .rc-tabs button{flex:1;padding:9px;border-radius:10px;font-family:var(--serif);font-size:14px;
      border:1px solid var(--line);background:var(--panel2);color:var(--ink2)}
    .rc-tabs button.on{background:var(--seal);color:#fff;border-color:var(--seal)}
    .rc-tabs .close{flex:none;width:44px;color:var(--seal);background:#fff}
    .know-card.hide,.map-card.hide{display:none}
    .pane{max-height:none}
    .mapwrap{height:64vh}
  }
  @media(max-width:560px){
    body{font-size:14.5px}
    .wrap{padding:12px 12px 96px}
    header.mast{gap:8px 12px;align-items:center;padding:4px 2px 12px;margin-bottom:14px}
    .seal-logo{width:38px;height:38px;font-size:18px}
    .mast h1{font-size:18.5px;letter-spacing:.02em}
    .mast .sub{font-size:11px;margin-top:1px}
    .mast .grow{flex:1 1 100%;height:0}
    .stat{flex:1;text-align:center}
    .stat b{font-size:17px}
    .stat span{font-size:9.5px;letter-spacing:.02em}
    .controls{padding:10px;gap:8px;margin-bottom:12px}
    .seg{flex:1 1 100%}.seg button{flex:1;padding:7px 0;font-size:13.5px}
    #chapSel{flex:1 1 100%}
    .controls .mini{flex:1 1 auto;text-align:center}
    .controls .grow{display:none}
    .qbox{padding:16px 15px 14px}
    .qstem{font-size:16px;margin-bottom:15px}
    .opt{padding:11px 12px;gap:10px}.opt .t{font-size:14px}
    .result .big{font-size:24px}
    .drawer{width:100vw;border-left:none}
    .fab{width:52px;height:52px;right:16px;bottom:16px;font-size:12px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="seal-logo">史</div>
    <div>
      <h1>近代史纲要 · 刷题台</h1>
      <div class="sub">单元测试 / 全书测试 · 知识库 + 人物事件 + 历史地图 + AI 复习</div>
    </div>
    <div class="grow"></div>
    <div class="stat"><b id="stCorrect">0</b><span>已答对</span></div>
    <div class="stat"><b id="stDone">0</b><span>已作答 / 483</span></div>
    <div class="stat"><b id="stWrong">0</b><span>错题本</span></div>
  </header>

  <div class="grid">
    <!-- LEFT -->
    <main>
      <div class="card controls">
        <div class="seg">
          <button id="mUnit" class="on" onclick="setMode('unit')">单元测试</button>
          <button id="mFull" onclick="setMode('full')">全书测试</button>
          <button id="mExam" onclick="setMode('exam')">模拟考</button>
        </div>
        <select id="chapSel" onchange="onChapChange()"></select>
        <button class="mini" id="newExamBtn" onclick="newExam()" style="display:none">🎲 换一套</button>
        <button class="mini" onclick="shuffleList()">🔀 乱序</button>
        <button class="mini" onclick="redoSet()">🔁 重做本组</button>
        <button class="mini" onclick="reviewWrong()">📕 错题重做</button>
        <div class="grow"></div>
        <button class="mini sidetoggle" onclick="openSide('map')">🗺️ 地图</button>
        <button class="mini sidetoggle" onclick="openSide('know')">📖 知识库</button>
        <button class="mini" onclick="resetProgress()">清空</button>
      </div>

      <div class="card result" id="result"></div>

      <div class="card qbox">
        <div class="qmeta" id="qmeta"></div>
        <p class="qstem" id="qstem"></p>
        <div class="opts" id="opts"></div>

        <div class="prerow" id="preRow">
          <button class="btn ai" onclick="aiHint()">💡 AI 提示</button>
          <span class="tiny">不确定时，先让 AI 给点思路（不直接给答案）</span>
        </div>
        <div class="hint-out" id="hintOut"></div>

        <div class="exp" id="exp">
          <div class="res" id="expRes"></div>
          <div class="ans" id="expAns"></div>
          <div class="ai-out" id="aiOut"></div>
          <div class="btnrow">
            <button class="btn solid" onclick="redoOne()">🔄 重做本题</button>
            <button class="btn ai" id="aiExpBtn" onclick="aiExplain()">✦ AI 详细解析</button>
            <button class="btn ghost" onclick="askAiAbout()">问 AI 这一题</button>
          </div>
        </div>

        <div class="btnrow" style="margin-top:18px;border-top:1px solid var(--line2);padding-top:16px">
          <button class="btn ghost" onclick="go(-1)">← 上一题</button>
          <button class="btn solid" onclick="go(1)">下一题 →</button>
          <div class="grow"></div>
          <span id="posLbl" style="color:var(--faint);font-size:13px;font-family:var(--serif)"></span>
        </div>
      </div>

      <div class="card sheet">
        <h3>答题卡
          <span class="legend">
            <i><span class="dot" style="background:var(--jade)"></span>对</i>
            <i><span class="dot" style="background:var(--seal)"></span>错</i>
            <i><span class="dot" style="background:var(--line)"></span>未答</i>
          </span>
        </h3>
        <div class="grid-n" id="sheet"></div>
      </div>
    </main>

    <!-- RIGHT -->
    <aside class="rightcol" id="rightcol">
      <div class="rc-tabs">
        <button id="rcKnow" class="on" onclick="rcTab('know')">📖 知识库</button>
        <button id="rcMap" onclick="rcTab('map')">🗺️ 历史地图</button>
        <button class="close" onclick="closeSide()">✕</button>
      </div>

      <section class="card know-card" id="knowCard">
        <div class="head">
          <div class="chtitle" id="knowTitle"></div>
          <div class="chsub" id="knowSub"></div>
          <span class="fullbadge" id="fullBadge"></span>
        </div>
        <div class="tabs">
          <button id="tabK" class="on" onclick="knowTab('k')">知识点</button>
          <button id="tabP" onclick="knowTab('p')">人物·事件</button>
          <button id="tabT" onclick="knowTab('t')">时间轴</button>
          <button id="tabE" onclick="knowTab('e')">思考题</button>
        </div>
        <div class="pane" id="paneK"></div>
        <div class="pane" id="paneP" style="display:none"></div>
        <div class="pane" id="paneT" style="display:none"></div>
        <div class="pane" id="paneE" style="display:none"></div>
      </section>

      <section class="card map-card" id="mapCard">
        <div class="map-head">
          <b>历史地图</b><span class="ms" id="mapSub">点击标记看事件</span>
          <div class="tools">
            <button class="tlbtn" id="tlBtn" onclick="toggleArrows()">显示时间线</button>
          </div>
        </div>
        <div class="mapwrap" id="mapWrap">
          <svg id="map" viewBox="0 0 840 640" preserveAspectRatio="xMidYMid meet">
            <g id="vp">
              <g id="baseG"></g>
              <g id="arrG"></g>
              <g id="mkG"></g>
            </g>
          </svg>
          <div class="map-ctrl">
            <button onclick="zoomBy(1.35)" title="放大">＋</button>
            <button onclick="zoomBy(0.74)" title="缩小">－</button>
            <button onclick="mapReset()" title="复位" style="font-size:14px">⟳</button>
          </div>
          <div class="map-legend" id="mapLegend"></div>
          <div class="map-pop" id="mapPop"></div>
        </div>
      </section>
    </aside>
  </div>
</div>

<button class="fab" onclick="openAI()">AI<br>复习</button>
<div class="scrim" id="scrim" onclick="closeAI();closeSide()"></div>

<div class="drawer" id="drawer">
  <div class="dh">
    <div class="seal-logo" style="width:34px;height:34px;font-size:16px;transform:none">AI</div>
    <b>AI 复习助手</b>
    <button class="x" onclick="closeAI()">✕</button>
  </div>
  <div class="prov">
    <span class="lab">引擎</span>
    <button id="pvClaude" class="on" onclick="setProvider('claude')">内置 AI</button>
    <button id="pvDS" onclick="setProvider('deepseek')">DeepSeek</button>
  </div>
  <div class="keyrow" id="keyrow">
    <input id="dskey" type="password" placeholder="粘贴 DeepSeek API Key（sk-...）" oninput="saveKey()">
    <div class="tip">Key 仅存于本地浏览器，用于直接调用 api.deepseek.com。在 Claude 站内预览中外部请求可能被拦截；如不通，请把本页下载到本地用浏览器打开后再用 DeepSeek。</div>
  </div>
  <div class="quickrow">
    <button onclick="quick('讲讲本章最容易考的5个考点')">本章高频考点</button>
    <button onclick="quick('帮我把本章的人物和对应事件列成对照表')">人物事件对照</button>
    <button onclick="quick('帮我梳理本章的时间线并解释因果关系')">梳理时间线</button>
    <button onclick="quick('用要点帮我解答并讲解本章的课后思考题')">课后思考题</button>
    <button onclick="quick('出3道本章的易错单选题考考我，先不给答案')">来几道易错题</button>
  </div>
  <div class="chatlog" id="chatlog"></div>
  <div class="chatin">
    <textarea id="chatbox" placeholder="问点什么…（Enter 发送）" onkeydown="chatKey(event)"></textarea>
    <button class="send" onclick="sendChat()">发送</button>
  </div>
</div>

中间路线幻灭", "“第三条道路”行不通，国民党迫害使改良幻想破灭，1948民盟一届三中全会接受中共领导", "181-182"], ["五一口号", "1948.4.30中共号召召开政协、建联合政府，各党派响应，奠定多党合作基础", "182-183"], ["正式确立", "1949.1李济深沈钧儒等55人发《对时局的意见》接受中共领导；1949.9人民政协召开标志制度确立", "183-184、188-189"]]}, {"q": "为什么说“没有共产党就没有新中国”？革命取得胜利的基本经验是什么？", "frame": "根本靠党领导→三经验(马克思主义中国化/三大法宝/人民民主专政)", "pts": [["根本原因", "革命走向胜利，从根本上说是由于有了中国共产党的领导", "189"], ["党的作用", "确立初心使命、指明目标、找到正确道路，把“一盘散沙”凝聚成不可战胜力量", "189"], ["科学结论", "为初心前赴后继、巨大牺牲，故“没有共产党就没有新中国”", "189-190"], ["经验①马克思主义中国化", "马列基本原理同中国实际结合（毛泽东思想指引正确纲领路线）", "190-191"], ["经验②三大法宝", "统一战线、武装斗争、党的建设", "191"], ["经验③人民民主专政", "革命根本问题是政权；建工农联盟为基础的人民民主专政、团结国际革命力量", "191"]]}]};
const ESSAYS_AI = {"1": [["社会性质发生根本变化。鸦片战争前的中国是一个独立的封建社会；战后，西方列强通过《南京条约》等一系列不平等条约破坏了中国的领土、领海、司法、关税和贸易等主权，独立的中国逐步变成半殖民地，封建的中国逐步变成半封建，中国开始沦为半殖民地半封建社会。【教材第23—24、30页】", "社会主要矛盾发生变化。帝国主义和中华民族的矛盾、封建主义和人民大众的矛盾成为近代中国社会的主要矛盾，而帝国主义与中华民族的矛盾是最主要的矛盾。【教材第23页】", "革命任务（两大历史任务）由此提出。争得民族独立和人民解放、实现国家富强和人民幸福，成为近代以来中华民族面临的两大历史任务，无数志士仁人为此进行了不屈不挠的斗争。【教材第23—24页】", "中国人民反抗外国侵略、救亡图存的斗争和近代意义上的民族民主革命，正是从鸦片战争开始的。因此鸦片战争是中国近代史的起点。【教材第23—24、35页】"], ["军事侵略。发动一次次侵华战争并屠杀中国人民（旅顺大屠杀、江东六十四屯惨案等）；侵占中国大片领土、划分势力范围（英割香港、俄共侵占150多万平方公里、日据台湾）；勒索巨额赔款（《马关条约》2亿两、《辛丑条约》本息近10亿两）；在华驻军、设立租界。【教材第23—26页】", "政治控制。控制中国内政外交、把当权者变成代理人（公使驻京、操纵清政府）；攫取领事裁判权；把持中国海关（赫德掌海关四十余年）；勾结清政府镇压中国人民的反抗；扶植、收买代理人（奕䜣、曾国藩、李鸿章、袁世凯等）。【教材第26—29页】", "经济掠夺。控制通商口岸、剥夺中国关税自主权；大规模商品倾销和资本输出；操纵中国的经济命脉（控制近代工业、金融、铁路航运）；破坏中国农业经济。使中国丧失经济独立，沦为西方大国的经济附庸。【教材第29—32页】", "文化渗透。披着宗教外衣进行侵略活动，为侵略中国制造舆论，宣扬殖民主义奴化思想、“种族优劣论”“黄祸论”，推行“庚款兴学”等，企图麻醉中国人民的精神、摧毁中国人的民族自尊心和自信心。【教材第33—34页】", "总之，资本-帝国主义的入侵是近代中国一切灾难的总根源，它使中国沦为半殖民地半封建社会，造成了近代中国经济的落后和人民的贫困；但其侵略也从反面教育了中国人民，刺激了中华民族的觉醒和反抗。【教材第32、34、44页】"], ["中国人民和爱国官兵进行了英勇顽强的反侵略斗争（三元里抗英、太平军重创洋枪队、台湾军民抗击日本、左宗棠收复新疆、冯子材镇南关大捷、邓世昌黄海血战、义和团运动等），沉重打击了外国侵略者，表现了中国人民不甘屈服、敢于斗争的英雄气概。【教材第35—38页】", "这种爱国主义精神进一步铸成了中华民族的民族魂。正是由于中国人民前仆后继、英勇顽强的斗争，才使我们的国家和民族历尽劫难、屡遭侵略而不亡。【教材第38页】", "粉碎了帝国主义列强瓜分和灭亡中国的图谋。包括义和团在内的中华民族不屈不挠的反侵略斗争，是列强瓜分中国阴谋破产的最根本原因，使侵略者认识到中国民族“是不可消灭的”。【教材第39—41页】", "反侵略斗争和反侵略战争的失败，从反面教育和警醒了中国人民，促进了民族意识的觉醒，为以后的民族民主革命准备了条件。【教材第41、44页】"], ["从中国内部因素看，失败主要有两方面原因：一是社会制度的腐败，二是经济技术的落后，而前者是更根本的原因。【教材第41—42页】", "社会制度的腐败是最重要、最根本的原因。清王朝昏庸愚昧、官员贪腐、将帅怕死，对外妥协投降，又压制人民群众的动员（鸦片战争重用琦善、中法战争“不败而败”、甲午挪用海军军费办寿、八国联军时反过来镇压义和团）。正是腐败的半殖民地半封建社会制度，阻碍了中国人民群众的广泛动员和抵抗。【教材第42—43页】", "经济技术的落后是另一个重要原因。国家综合实力特别是经济技术和作战能力落后（清军多用冷兵器、旧式火器，英军普遍使用步枪、开花弹）。但武器是战争的重要因素而非决定因素，决定因素是人而不是物。【教材第43—44页】", "教训：落后就要挨打。要争得民族独立和人民解放，必须从根本上推翻帝国主义、封建主义联合统治的半殖民地半封建社会制度，必须改变经济技术落后的面貌，实现国家富强；旧式的、改良的斗争都无法完成这一任务，必须寻找新的领导力量和正确的革命道路。【教材第23、44页】"]], "2": [["历史意义之一：沉重打击了封建统治阶级，强烈撼动了清政府的统治根基（历时14年、转战18省、建立了与清王朝对峙的政权）。【教材第53页】", "历史意义之二：是中国旧式农民战争的最高峰。《天朝田亩制度》比较完整地表达了农民对土地的渴望，《资政新篇》是近代中国第一个比较系统的发展资本主义的方案，使其具有不同于以往农民战争的新的历史特点；同时它冲击了孔子和儒家经典的正统权威，有力打击了外国侵略势力，并冲击了西方殖民者在亚洲的统治。【教材第53页】", "失败的根本原因：农民阶级不是新的生产力和生产关系的代表，无法克服小生产者固有的阶级局限性，缺乏科学理论指导，没有先进阶级的领导，因而提不出完整、正确的政治纲领和社会改革方案。【教材第53—54页】", "其他原因：后期领导集团腐败、争权夺利、内讧（天京事变）；军事战略上的重大失误（未与捻军结盟、死守孤城）；以拜上帝教发动组织群众，不能正确指导斗争；未能正确对待儒学，也不能把西方侵略者与人民区别开来。【教材第54页】", "教训：在半殖民地半封建的中国，农民具有伟大的革命潜力，但单纯的农民战争不可能完成争取民族独立和人民解放的历史任务，农民阶级自身不能担负起领导反帝反封建斗争取得胜利的重任。【教材第54页】"], ["性质：洋务运动是19世纪60—90年代地主阶级洋务派（奕䜣、曾国藩、李鸿章、左宗棠、张之洞等）以“自强”“求富”为目标，在不触动封建统治的前提下引进西方军事和生产技术、兴办近代企业的一场地主阶级自救运动，其指导思想是“中学为体，西学为用”，根本目的是维护封建统治，而非使中国走向独立的资本主义。【教材第55—57页】", "历史作用：客观上促进了中国早期工业和民族资本主义的发展；开办新式学堂、派遣留学生，是中国近代教育的开始；传播了新知识，冲击了传统观念，有利于资本主义经济发展和社会风气的改变。【教材第57页】", "失败标志：甲午战争中北洋海军全军覆没，标志着洋务运动的失败。【教材第58页】", "失败原因：（1）封建性——指导思想“中体西用”，以维护巩固封建统治为目的，决定了它必然失败；（2）依赖性——对外“和戎”，企图依赖外国达到“自强”“求富”，无异于与虎谋皮；（3）管理的腐朽性——新式企业管理仍是封建衙门式，营私舞弊、贪污浪费。【教材第58页】", "教训：在不触动封建制度根本的前提下，单纯学习西方技术、走改良道路，不可能使中国真正富强，也不可能为中国摆脱贫弱找到出路。【教材第58页】"], ["意义之一：是一次爱国救亡运动。维新派在民族危亡关头高举救亡图存旗帜，要求变法图强、发展资本主义，推动了中华民族的觉醒。【教材第63页】", "意义之二：是一场资产阶级性质的政治改良运动。它突破洋务派“中体西用”的局限，主张以君主立宪制取代君主专制制度，在政治、经济等领域一定程度上冲击了封建制度。【教材第64页】", "意义之三：是一场思想启蒙运动。维新派传播西方资产阶级社会政治学说和自然科学知识，宣传自由平等、社会进化观念，批判封建君权和纲常伦理，促进了思想解放、文化革新和近代教育的发展。【教材第64页】", "失败原因：客观上是以慈禧太后为首的强大守旧势力的反对（戊戌政变）；主观上是维新派自身的局限——不敢否定封建主义、对帝国主义抱有幻想、惧怕人民群众而脱离群众，只能把希望寄托在没有实权的光绪皇帝身上。根本上则是当时民族资本主义经济力量微弱、民族资产阶级力量弱小。【教材第64—65页】", "教训：在半殖民地半封建的旧中国，企图通过统治者走自上而下的改良道路是根本行不通的，必须用革命的手段推翻帝国主义、封建主义联合统治的社会制度。“戊戌六君子”流血的教训，促使一部分人放弃改良、走上革命道路。【教材第65页】"]], "3": [["论战背景与焦点：1905—1907年间，革命派与改良派分别以《民报》《新民丛报》为阵地展开大论战，焦点是：要不要以革命手段推翻清王朝、要不要推翻帝制实行共和、要不要进行社会革命。【教材第75页】", "论述革命的必要性：清政府是帝国主义的“鹰犬”，因此爱国必须革命；只有通过革命才能“免瓜分之祸”，获得民族独立和社会进步；不革命而容忍清王朝的统治，中国人民将长期遭受难堪的痛苦并作出更大的牺牲。【教材第75—76页】", "论述革命的正义性：针对改良派“革命要杀人流血、破坏一切”的责难，革命派指出，革命虽不免流血牺牲，但“不革命则杀人流血之祸”也不可免；革命可以“救世救人”，是疗治社会的捷径，因而是正义的。【教材第76页】", "论述革命的进步性：人们在革命中付出的努力乃至牺牲，是以换取历史的进步作为补偿的；“革命之破坏与革命之建设必相辅而行”，破坏与建设是革命的两个方面，革命本身正是为了建设。【教材第76页】", "论战意义：这场论战划清了革命与改良的界限，传播了民主革命思想，促进了革命形势的发展（同时也暴露了革命派在反帝、土地等问题上的理论弱点）。【教材第76—77页】"], ["辛亥革命是一次比较完全意义上的资产阶级民主革命，是中国人民为救亡图存、振兴中华而奋起革命的一座里程碑，使中国发生了历史性的巨变。【教材第81页】", "第一，推翻了清王朝的统治，沉重打击了中外反动势力，此后帝国主义和封建势力在中国再也不能建立起比较稳定的统治，为中国人民斗争的发展开辟了道路。【教材第81页】", "第二，结束了延续两千多年的封建君主专制制度，建立了中国历史上第一个资产阶级共和政府，使民主共和的观念开始深入人心（“敢有帝制自为者，天下共击之”）。【教材第81页】", "第三，推动了中国人民的思想解放，打开了禁锢思想进步的闸门，激发了人民的爱国热情和民族觉醒。【教材第81页】", "第四，推动了中国社会变革，促使社会经济、思想习惯和社会风俗等方面发生新的积极变化（兴办实业、改用公历、剪辫放足、革除旧称等）。【教材第81页】", "第五，不仅在一定程度上打击了帝国主义的侵略势力，而且推动了亚洲各国民族解放运动的高涨。【教材第82页】"], ["根本原因：在帝国主义时代、在半殖民地半封建的中国，资本主义的建国方案是行不通的。帝国主义决不容许中国建立独立富强的资产阶级共和国，它们与封建势力、旧官僚、立宪派相勾结，从外部和内部绞杀了这场革命。【教材第87页】", "主观原因之一：没有提出彻底的反帝反封建的革命纲领。革命派没有明确提出反帝口号，甚至幻想以妥协退让换取帝国主义的承认；只强调反满和建立共和，没有认识到必须反对整个封建统治阶级。【教材第87—88页】", "主观原因之二：不能充分发动和依靠人民群众，尤其不敢依靠反封建的主力军农民群众，使革命的根基相当单薄。【教材第88页】", "主观原因之三：不能建立坚强的革命政党作为团结一切革命力量的核心（同盟会组织松懈、派系纷杂）。这些弱点根源于中国民族资产阶级的软弱性和妥协性。【教材第88页】", "失败说明：辛亥革命的失败表明，资产阶级共和国的方案没有能够救中国，资产阶级不能领导中国革命取得胜利；先进的中国人需要进行新的探索，为中国谋求新的出路（呼唤新的领导阶级和新的革命道路）。【教材第88—89页】"]], "4": [["原因一（旧路走不通）：辛亥革命失败后，资产阶级民主主义不能为人们提供认识和改造中国的有效思想武器，先进分子陷于苦闷和彷徨之中。【教材第93页】", "原因二（十月革命的推动）：俄国十月革命使中国人看到了民族解放的新希望——它发生在国情与中国相同或近似的俄国、具有特殊吸引力；社会主义俄国号召反帝并以平等态度对待中国；十月革命中工农兵群众广泛发动赢得胜利，给中国先进分子以新的革命方法的启示。【教材第93—94页】", "原因三（反复比较的结果）：在无政府主义等各种社会主义流派纷然杂陈的情况下，中国先进分子是经过反复比较才选择了马克思主义的；自从学会马克思列宁主义，中国人在精神上就由被动转入主动。【教材第94、102页】", "途径一：李大钊率先在中国举起马克思主义旗帜（《庶民的胜利》《我的马克思主义观》），标志着马克思主义在中国进入比较系统的传播阶段。【教材第94—95页】", "途径二：五四运动促进了马克思主义的广泛传播及其同中国工人运动的结合，形成了早期马克思主义者队伍（李大钊、陈独秀为先驱擎旗人，毛泽东等五四左翼骨干为主体，还有董必武等）。【教材第98—100页】", "途径三：早期马克思主义思想运动重视基本理论学习、注意从中国实际出发运用马克思主义、开始提出知识分子同劳动群众相结合；并通过同改良主义、无政府主义等反马克思主义思潮的论战，划清界限，推动更多人走上马克思主义道路。【教材第100—101、105—106页】"], ["中国共产党的成立是中华民族发展史上一个开天辟地的大事变，具有伟大而深远的意义。【教材第109页】", "近代以后中国人民反帝反封建斗争屡遭失败，最重要的原因就是没有先进的、坚强的政党作为凝聚力量的领导核心；中国共产党的诞生从根本上改变了这种局面。【教材第109页】", "中国共产党一经成立，就把实现共产主义作为最高理想和最终目标，义无反顾地肩负起实现中华民族伟大复兴的历史使命，中国人民由此踏上了争取民族独立、人民解放，实现国家富强、人民幸福的光明道路。【教材第108—109页】", "它形成了伟大建党精神（坚持真理、坚守理想，践行初心、担当使命，不怕牺牲、英勇斗争，对党忠诚、不负人民），这是中国共产党的精神之源。【教材第109页】", "中国共产党是以马克思列宁主义为指导的新型工人阶级革命政党，它的成立深刻改变了近代以后中华民族发展的方向和进程，深刻改变了中国人民和中华民族的前途和命运，深刻改变了世界发展的趋势和格局。【教材第108—109页】"], ["中国共产党人的初心使命：中国共产党从成立之日（诞生之日）起，就把为中国人民谋幸福、为中华民族谋复兴确立为自己的初心使命。【教材第108页；第189页】", "原因一：这个初心使命是激励中国共产党人不断前进的根本动力。正是为了实现初心使命，中国共产党进行了前赴后继的不懈奋斗、作出了巨大牺牲，才领导中国革命取得胜利、建立了新中国。【教材第189—190页】", "原因二：“没有共产党就没有新中国”是中国人民依据近代中国革命历史经验得出的科学结论；只有不忘初心、牢记使命，党才能始终保持先进性和纯洁性，始终同人民群众保持血肉联系。【教材第189页】", "原因三：在新时代，只有不忘初心、牢记使命，才能继续团结带领人民以史为鉴、开创未来，实现中华民族伟大复兴（参见习近平在庆祝中国共产党成立100周年大会上的讲话）。【教材第118页（必读文献）】"], ["制定了新的革命纲领：中共二大第一次提出反帝反封建的民主革命纲领（最高纲领是实现社会主义、共产主义，最低纲领是打倒军阀、推翻国际帝国主义压迫、统一中国为真正的民主共和国），为中国人民指明了明确的斗争目标。【教材第109—110页】", "发动了工农运动：领导掀起中国工人运动的第一个高潮（香港海员罢工到京汉铁路罢工），开展农民运动（浙江萧山、广东海丰农会），并开展青年运动和妇女运动。【教材第110—111页】", "实行国共合作、掀起大革命高潮：推动建立革命统一战线（第一次国共合作），领导反帝反封建的大革命，北伐战争基本摧毁了北洋军阀的主力，形成了空前广大的人民解放运动。【教材第111—115页】", "在大革命中起了独特的、不可替代的作用：中国共产党是反帝反军阀政治口号的提出者、统一战线的组织者、群众运动的主要发动者和组织者、革命战争的重要力量。【教材第114—115页】", "总之，中国共产党的成立使中国革命有了新的领导核心、科学的指导思想、明确的奋斗目标和新的革命方法，中国革命的面貌焕然一新。【教材第109页】"]], "5": [["在大革命失败后的严峻环境（白色恐怖）下，中国共产党人毅然举起独立领导武装斗争和土地革命的旗帜，开始了对革命新道路的艰难探索。【教材第123页】", "八七会议（1927年8月7日）确定了土地革命和武装起义的方针，毛泽东提出“政权是由枪杆子中取得的”，并提出“找着新的道路”的任务，实现了由大革命失败到土地革命战争兴起的历史性转变。【教材第124页】", "发动武装反抗国民党反动统治的斗争：南昌起义打响了武装反抗国民党反动派的第一枪，秋收起义、广州起义及各地近百次起义相继举行；三湾改编从组织上确立了党对军队的领导。【教材第124—125页】", "进军农村、创建井冈山根据地：秋收起义攻打长沙受挫后，毛泽东果断转向农村，创建井冈山农村革命根据地，点燃了“工农武装割据”的星星之火，开辟了农村包围城市、武装夺取政权这条前人没有走过的正确道路。【教材第124—126页】", "从理论上作出概括：毛泽东写《中国的红色政权为什么能够存在？》《井冈山的斗争》《星星之火，可以燎原》，提出“工农武装割据”思想；《反对本本主义》提出“没有调查，没有发言权”。【教材第126—127页】", "古田会议（1929年12月）确立了思想建党、政治建军的原则，解决了在以农民为主要成分的条件下保持党的无产阶级先锋队性质、建设新型人民军队的重大问题；随后开展土地革命和反“围剿”斗争，建立中华苏维埃共和国，推动中国革命走向复兴。【教材第127—129页】"], ["道路选择新：它打破了“以城市为中心”的传统观念和俄国十月革命城市武装起义的模式，走的是农村包围城市、武装夺取政权这样一条前人没有走过的崭新道路。【教材第125—126页】", "立足点和形式新：把武装斗争的立足点放在农村，在农村发动农民群众、开展游击战争、进行土地革命、创建工农政权，实行“工农武装割据”。【教材第125—126页】", "依靠力量新：紧紧依靠农民这个民主革命的主力军，领导农民进行土地制度的革命，从而抓住并解决了中国革命的基本问题。“先有农村红军，后有城市政权”，这是中国革命的特征，是中国经济基础的产物。【教材第126、128页】", "实质：这条新道路体现了中国共产党独立自主地把马克思列宁主义基本原理同中国革命具体实际相结合，是马克思主义中国化的重大成果。【教材第126—127页】"], ["长征是人类历史上的伟大壮举，是一次理想信念的伟大远征，是一次检验真理、唤醒民众、开创新局的伟大远征。【教材第134页】", "长征的胜利极大地促进了党在政治上和思想上的成熟——使党进一步认识到，只有把马克思主义基本原理同中国革命具体实际结合、独立自主解决中国革命重大问题，才能把革命引向胜利。【教材第134页】", "长征的胜利是中国革命转危为安的关键。它宣告了国民党反动派消灭共产党和红军图谋的彻底失败，实现了党和红军的战略转移，实现了中国革命从挫折走向胜利的伟大转折，开启了为实现民族独立、人民解放而斗争的新的伟大进军（“长征是宣言书，长征是宣传队，长征是播种机”）。【教材第134—135页】", "长征精神的内涵：把全国人民和中华民族的根本利益看得高于一切、坚定革命理想信念；为救国救民不怕任何艰难险阻、不惜付出一切牺牲；坚持独立自主、实事求是、一切从实际出发；顾全大局、严守纪律、紧密团结；紧紧依靠人民群众、艰苦奋斗。【教材第135页】", "如何继承发扬：新时代青年要坚定理想信念，发扬艰苦奋斗、独立自主、实事求是的精神，顾全大局、紧密团结、依靠人民，把个人理想融入民族复兴伟业，走好新时代的长征路。【教材第135页（结合阐发）】"], ["古田会议确立思想建党、政治建军原则，着重纠正党内各种非无产阶级思想，阐述加强党的思想建设的极端重要性。【教材第127页】", "毛泽东撰写《反对本本主义》，提出“没有调查，没有发言权”“中国革命斗争的胜利要靠中国同志了解中国情况”，初步形成实事求是、群众路线、独立自主的思想路线。【教材第127页；第136页（必读文献）】", "遵义会议坚持真理、修正错误，确立党中央的正确领导，开启了党独立自主解决中国革命实际问题的新阶段。【教材第133页】", "红军长征到达陕北后，毛泽东、党中央用很大精力总结历史经验、加强党的思想理论建设：写《论反对日本帝国主义的策略》《中国革命战争的战略问题》，讲授《实践论》《矛盾论》，从马克思主义认识论高度批判主观主义尤其是教条主义，科学阐明党的马克思主义思想路线。【教材第135页】", "这些理论工作对党的政治路线、军事路线和思想路线作了系统阐述，在理论上武装了全党，为即将到来的全民族抗日战争从思想上、政治上和组织上奠定了坚实基础。【教材第135页】"]], "6": [["面对日本企图灭亡中国的野蛮侵略（九一八事变、华北事变、七七事变，南京大屠杀、“三光”政策、细菌战等空前严重的罪行），中华民族到了最危险的时刻，抗日战争是中华民族全民族的反侵略战争，是正义战争。【教材第138—140、144页】", "它是在抗日民族统一战线旗帜下进行的全民族抗战：工人、农民、知识分子、民族工商业者、各党派、各民族、台湾同胞、港澳同胞和海外华侨等全体中华儿女万众一心、共御外侮。【教材第144—145页】", "其根本目的是救亡图存、争取民族独立和解放，捍卫国家主权和领土完整，并保卫世界和平，因而是神圣的民族解放战争。【教材第144、164页】", "它是近代以来中国人民反抗外敌入侵第一次取得完全胜利的民族解放斗争，彻底洗刷了近代以来抗击外来侵略屡战屡败的民族耻辱，是中华民族从近代以来陷入深重危机走向伟大复兴的历史转折点。【教材第164—165页】"], ["率先高举武装抗日旗帜：九一八事变后中国共产党率先发表宣言号召抗日，直接领导东北人民的抗日武装斗争（东北抗日联军），积极参加和推动抗日救亡运动。【教材第141页】", "倡导建立并维护抗日民族统一战线：提出抗日民族统一战线新政策（瓦窑堡会议），推动西安事变和平解决，促成第二次国共合作和全民族抗战局面的形成。【教材第142—144页】", "实行全面抗战路线（人民战争路线）和持久战的战略总方针：洛川会议制定抗日救国十大纲领；毛泽东《论持久战》批驳“亡国论”“速胜论”，科学指明了抗战的发展规律和胜利道路。【教材第148—149页】", "开辟敌后战场、坚持游击战争：开辟广大敌后抗日根据地，人民军队对敌作战12.5万余次，消灭日伪军171.4万余人，敌后战场逐步上升为主战场，成为坚持抗战、夺取胜利的决定性力量。【教材第149—151页】", "坚持团结抗战、反对妥协分裂倒退：提出“坚持抗战、团结、进步”三大口号，坚持统一战线中的独立自主原则，以斗争求团结，维护了抗战大局。【教材第151—153页】", "加强抗日民主根据地建设（“三三制”政权、减租减息、大生产运动）和党的自身建设（提出“马克思主义中国化”，开展整风运动，召开中共七大确立毛泽东思想的指导地位）。结论：中国共产党的中流砥柱作用是中国人民抗日战争胜利的关键。【教材第153—160、164页】"], ["路线：国民党政府实行片面抗战路线——不敢放手发动和武装民众，把希望单纯寄托在政府和正规军的抵抗上，战略战术上进行单纯的阵地防御战。这与中国共产党的全面抗战（人民战争）路线根本不同。【教材第146页】", "战略防御阶段的地位与作用：以国民党军队为主体的正面战场担负了抗击日军战略进攻的主要任务，组织了淞沪、忻口、徐州、武汉等一系列大战役（取得台儿庄大捷），爱国官兵英勇抗战，对消耗日军、粉碎其速战速决企图起了重要作用，这一时期国民党政府对日作战比较努力。【教材第145—146页】", "局限：由于实行片面抗战路线和单纯阵地防御的战略指导失误，正面战场大多数战役以退却、失败告终，使中国在短时间内丧失大片国土。【教材第146页】", "战略相持阶段：国民党推行“防共”“限共”“溶共”方针，在全局上日趋消极抗战、保存实力，制造反共“摩擦”，直至豫湘桂大溃败，国民党统治陷入深刻危机。【教材第146—147页】", "总体评价：国民党正面战场在抗战初期发挥了重要作用，但由于其阶级局限和片面抗战路线，作用逐渐下降，不能担负起领导全民族取得抗战胜利的重任。【教材第146—147页】"], ["抗日战争的伟大胜利，是中华民族从近代以来陷入深重危机走向伟大复兴的历史转折点。【教材第165页】", "它彻底粉碎了日本军国主义殖民奴役中国的图谋，有力捍卫了国家主权和领土完整（台湾光复），彻底洗刷了近代以来抗击外来侵略屡战屡败的民族耻辱。【教材第165页】", "它促进了中华民族的大团结，形成了伟大的抗战精神（天下兴亡、匹夫有责的爱国情怀，视死如归、宁死不屈的民族气节，不畏强暴、血战到底的英雄气概，百折不挠、坚忍不拔的必胜信念），是弥足珍贵的精神财富。【教材第165页】", "它促进了中国人民的觉醒和中国革命力量的空前壮大，为党领导人民赢得新民主主义革命胜利奠定了重要基础。【教材第165—166页】", "它重新确立了中国在世界上的大国地位，中国成为联合国安理会五个常任理事国之一，国际地位显著提高，中华民族赢得了崇高的民族声誉，并开启了古老中国凤凰涅槃、浴火重生的历史新征程。【教材第165—166页】"]], "7": [["根本原因：国民党政权代表大地主、大资产阶级的利益，其统治的社会基础极其狭隘，它坚持独裁、内战的反人民方针，违背了历史发展方向和全国人民的根本利益。【教材第168—171、184页】", "政治上违背民意、发动内战：国民党撕毁政协协议、悍然发动全面内战，丧失人心；而中国共产党真诚争取和平民主（重庆谈判、政协会议），使各界群众认清了谁应对战争负责，在政治上赢得了主动（“满载人心归去”）。【教材第170—172页】", "经济上陷入危机、掠夺人民：国民党政府滥发纸币、恶性通货膨胀，官僚资本极度膨胀，工农业萎缩、民族工商业濒于倒闭，国统区陷入严重经济危机；接收变“劫收”、贪污腐败，大失民心。【教材第176—177页】", "第二条战线的形成：国统区以学生运动为先导的人民民主运动（一二·一运动、抗暴运动、五二〇运动等）迅速高涨，工人罢工、农民暴动、民变蜂起，形成配合人民解放战争的第二条战线，使国民党政府陷入全民的包围。【教材第176—178页】", "军事上的彻底失败：人民解放军以革命战争反对反革命战争，经土地改革（《中国土地法大纲》）广泛发动农民、取得人力物力支援，经战略防御转入战略进攻，通过辽沈、淮海、平津三大战役基本摧毁国民党主力；1949年4月解放南京，宣告延续22年的国民党反动统治覆灭。【教材第172—175、184—186页】"], ["民主党派的性质：中国各民主党派形成时的社会基础，主要是民族资产阶级、城市小资产阶级以及同这些阶级相联系的知识分子和其他爱国分子，是阶级联盟性质的政党，是中国政治生活中一支重要的力量。【教材第180页】", "民主党派的历史作用：各民主党派都主张爱国、反对卖国，主张民主、反对独裁，在这些方面同中共的新民主主义革命政纲基本一致；它们作为“第三方面”同中共一起反对国民党的内战独裁政策，为和平民主奔走，积极参加和支持国统区的爱国民主运动，在第二条战线斗争中尽了一份力量。【教材第180—181页】", "格局形成（一）：“第三条道路”（中间路线）的幻灭。客观形势决定了中国没有走中间路线的余地，国民党的暴力迫害（宣布民盟为“非法团体”）使改良幻想破灭，1948年民盟一届三中全会等明确宣布接受中共领导、走人民革命道路。【教材第181—182页】", "格局形成（二）：1948年4月30日中共发布纪念“五一”劳动节口号，号召召开政治协商会议、成立民主联合政府，得到各民主党派热烈响应，揭开了协商建国的序幕，奠定了多党合作和政治协商制度的基础；中共还护送大批民主人士北上。【教材第182—183页】", "格局形成（三）：1949年1月，李济深、沈钧儒等55人发表《对时局的意见》，公开自愿接受中国共产党的领导；民主党派由旧中国的在野党转变为在中共领导下共同建设新中国的参政力量。1949年9月人民政协会议的召开，标志着中国共产党领导的多党合作和政治协商制度正式确立。【教材第183—184、188—189页】"], ["中国革命之所以能够走上胜利发展的道路，从根本上说，是由于有了中国共产党的领导。【教材第189页】", "中国共产党从诞生之日起就把为中国人民谋幸福、为中华民族谋复兴确立为初心使命；它为中国人民指明了斗争目标，找到了使革命走向胜利的正确道路，把被视为“一盘散沙”的中国人民团结凝聚成万众一心、不可战胜的力量。【教材第189页】", "为实现初心使命，中国共产党进行了前赴后继的不懈奋斗、作出了巨大牺牲。所以说“没有共产党就没有新中国”，这是中国人民依据近代中国革命历史经验得出的科学结论。【教材第189—190页】", "基本经验之一：必须坚持把马克思列宁主义基本原理同中国具体实际结合起来，不断推进马克思主义中国化——正是在毛泽东思想指引下，党制定了正确的纲领和路线方针政策，找到了适合本国国情的革命道路。【教材第190—191页】", "基本经验之二：锻造出战胜敌人的三个主要法宝——统一战线、武装斗争、党的建设。【教材第191页】", "基本经验之三：革命的根本问题是国家政权问题，必须建立工人阶级（经过共产党）领导的、以工农联盟为基础的人民民主专政，并同国际革命力量团结一致。中国人民革命的胜利和人民民主专政新中国的创建，为实现中华民族伟大复兴创造了根本社会条件。【教材第191页】"]]};
const ESSAYS_ORG = {"1": [["鸦片战争是中国近代史的起点，原因在于：", "（1）中国的社会性质发生了根本性的变化鸦片战争后，中国由封建社会沦为半殖民地半封建社会。", "（2）中国的发展方向发生了变化鸦片战争前中国是一个没落的封建大国，封建制度已经非常腐朽，在缓慢地向资本主义社会发展，如果没有外来势力干扰，中国最终也会向西方大国那样发生资产阶级革命成为资本主义国家：而鸦片战争后中国的民族资本主义不可能获得正常发展，中国也就不可能发展为成熟的资本主义社会，而最终选择了社会主义道路。", "（3）社会主要矛盾发生了变化随着中国社会性质的变化，中国社会的主要矛盾也必然发生变化。鸦片战争前中国的主要矛盾是农民阶级与封建地主阶级的矛盾，而战后社会主要矛盾变得复杂化，主要有两对：即外国资本主义和中华民族的矛盾：封建主义和人民大众的矛盾。而且，随着外国资本主义侵略的深入，外国资本主义和中华民族的矛盾，成为各种社会矛盾中最主要的矛盾。", "（4）革命任务发生了变化随着中国社会矛盾的变化，中国革命任务也必然发生变化。战前，中国革命的性质是农民阶级的反封建斗争。从鸦片战争开始，中国人民开始反对外国资本主义侵略、反对本国封建统治的双重革命，从此。中国进入了旧民主主义革命总之，鸦片战争是中国遭受外国资本主义奴役的起点。随着外国资本主义的入侵，中国的封建社会逐步变成了半殖民地半封建社会。中国人民逐渐开始了反帝反封建的资产阶级民主革命。正因为如此，片战争就成为中国近代史的起点。"], ["资本-帝国主义的入侵从经济、政治、军事、文化、社会上给中国带来了多方面的危害。具体分析如下：", "（1）经济上沦为资本-帝国主义的附庸资本-帝国主义对中国经济的入侵，主要是强追中国支付战争赔款和签订一系列的不平等条约。主要方式有：控制中国的通商口岸：剥夺中国的关税自主权：实行商品倾销和资本输出：榨取中国的经济命脉等等。资本-帝国主义列强的入侵，使中国在经济上丧失了独立性。中国被纳入资本主义的世界经济体系，成了西方大国的经济附庸。并且他们同中国封建主义相勾结，导致了近代中国经济的落后和人民的贫困。", "（2）政治上丧失部分主权帝国主义主要通过控制中国的政府，来控制中国的内政、外交。随着中国领土，领海、司法、关税和贸易主权开始遭到严重破坏，中国人民的反抗被镇压，军阀、官僚被扶植成代理人，中国逐渐由一个独立自主的国家沦为半殖民地半封建社会国家。", "（3）文化上进行侵略和渗透的是为帝国主义侵略中国制造舆论", "（4）社会主要矛盾的变化西方列强的入侵给近代中国带来了深远影响，中华民族不甘心受列强入侵，开始了一系列反对侵略的抗争，因此，外国资本-帝国主义同中华民族的矛盾代替了本国封建主义同人民大众的矛盾而上升为主要矛盾。", "（5）部分中国知识分子开始探索实现国家独立和现代化无论在经济、政治体系还是其他方面中国和西方列强都明显存在很大差距，西方列强的入侵时，一部分知识分子开始注目世界，寻求强国御辱之道，新思潮前发，冲击了封建思想。甲午中日战争、戊戌维新、辛亥革命，这些为了救亡图存、振兴中华而进行的斗争和探索，使中华民族燃起了新的希望，标志着中华民族的进一步觉醒。"], ["反对外国侵略的斗争的意义主要体现在以下几个方面：", "（1）粉碎了帝国主义瓜分中国的图谋近代中国人民进行的反侵略战争，沉重打击了帝国主义侵华的野心，粉碎了他们瓜分中国和把中国变成完全殖民地的图谋。中国人民的英勇斗争，表现了中国人民不屈不挠的爱国主义精神，给外国侵略者以沉重打击和深刻教训，使他们越来越清楚地认识到，中国是一个很难征服的国家，他们虽然可以强迫清政府签订一个又一个不平等条约，但是始终无法把中国变成他们完全的殖民地。尤其是甲午中日战争以后，在瓜分危机的严重关头，中国各阶层人民救亡图存的努力探索和奋起抗争，使侵略者看到了中国人民所隐含的不甘屈服的伟大力量。", "（2）振奋了民族精神，激励了民族斗志近代中国人民进行的反侵略战争，教育了中国人民，振奋了中华民族的民族精神，鼓舞了人民反帝反封建的斗志，大大提高了中国人民的民族觉醒意识。", "（3）促进了部分中国人的觉，开始关注和研究国际形势发展帝国主义的侵略给中华民族带来了巨大灾难，但没有哪一次巨大的历史灾难不是以历史的进步作为补偿的，列强发动的侵华战争以及中国人民反侵略战争的失败，从反面教育了中国人民，极大地促进了中国人民的思考、探索和奋起直追。例如，鸦片战争以后，先进的中国人开始注意了解国际形势，研究外国历史地理，提出师夷长技以制夷的思想：甲午战争以后，中华民族的民族意识开始普遍觉醒，救亡图存思想日益高涨等。"], ["从1840年到1919年的80年间，中国人民对外来侵略进行了英勇顽强的反抗，这些反抗侵略斗争具有重大的历史作用，但是历次的反侵略战争都是以中国的失败而告终，中国政府被迫签订了一系列丧权辱国的条约。", "（1）反侵略战争失败的根本原因中国在历次反侵略战争中失败的根本原因是社会制度的腐败。近代中国社会政治制度的腐败和清政府的腐朽无能是中国反侵略战争失败的根本原因。一方面，清政府封闭自守，妄自尊大，骄奢淫逸，盲目进攻：另一方面，清军指挥人员在战争面前完全没有应变的能力和心态，不适应近代战争，不少将帅贪生怕死，临阵脱逃，有的甚至出卖国家和民族利益，另外，清政府尤其害怕人民群众，担心人民群众动员起来会危及自身统治，因此，不敢发动和依靠人民群众的力量。", "（2）反侵略战争的失败的教训", "①近代中国，要争取国家独立和民族富强，必须推翻帝国主义、封建主义联合统治的半殖民地半封建的社会制度。帝国主义侵略是造成中国人民巨大灾难的根源。与此同时，腐朽的清政府也已失去了领导中国人民进行反侵略战争胜利的能力和资格。因此，反对帝国主义侵略，同时又妥推翻封建腐朽的封建专制制度，是历史赋予中国人民的两大历史任务。", "②落后就要挨打，要取得反侵略战争的胜利，需要在科学技术方面奋起直追，需要进行现代化建设。但现代化建设的前提是获得民族独立和人民解放，不推翻帝国主义对中国的反动统治，就没有进行现代化的前提和条件，就难以使中国真正强大起来。"]], "2": [["（1）太平天国农民战争的意义", "①太平天国农民战争是中国近代民主革命准备时期的重要事件。沉重打击了清王朝的封建专制统治秩序，动摇了清王朝封建统治的基础，加速了清王朝的衰败。反抗并有力地打击了外国侵略势力，捍卫了国家独立和民族利益。拒绝承认不平等条约和禁止鸦片走私。并与外国侵略势力勇敢作战。.冲击了孔子和儒家经典的正统权威，瓦解了封建思想与文化，在一定程度上削弱了封建统治的精神支柱。", "②太平天国农民战争历时14年，转战18省，是中国旧式农民战争的最高峰，具有不同于以往农民战争的新的历史特点《天朝田亩制度》的主张，从根本上否定了封建社会的基础即封建地主的土地所有制，体现了广大农民要求平均分配土地的强烈愿望，是对以往农民战争中“均贫富”“等贵贱”和“均平”“均田”思想的发展和超越。具有进步意义。《资政新篇》是中国近代历史上第一个比较系统的发展资本主义的方案，这反映了太平天国某些领导人在后期试图通过向外国学习来寻求出路的一种努力，因此，太平天国起义具有了不同于以往农民战争的新的历史特点。", "③太平天国农民战争对日后反帝反封建的启迪和鼓舞。在19世纪中叶的近代亚洲民族解放运动中，太平天国起义“时间最久、规模最大、影响最深”，它和其他亚洲国家的民族解放运动一道，有力地冲击了西方殖民主义者在亚洲的统治。对中国资产阶级革命派的启示和激励。孙中山在辛亥革命就以“洪秀全第二”自居，赞扬和宣传太平天国的斗争精神，决心武力反清。", "（2）太平天国农民战争失败的原因和教训太平天国农民起义动摇了清王朝封建统治的基础，有力地打击了西方资本主义侵略者，显示了农民阶级的反抗精神和战斗力量，然而，其失败的原因和教训是深刻的。", "①农民阶级不是新的生产力和生产关系的代表，无法克服小生产者所固有的阶级局限性，缺乏科学思想理论的指导，没有先进阶级的领导，因而无法从根本上提出完整的、正确的政治纲领和社会改革方案。", "②太平天国后期无法制止和克服领导集团自身腐败现象的滋生，领导集团的一些人在生活上追求享乐，在政治上争权夺利。", "③太平天国军事战略上出现了重大失误，比如，没有解决好与军这一抗清斗争主力的关系，没有同他们结成同盟，以致丢失了在北方赖以发展的良机，使北伐军艰难支撑直至失败：在天京被围困的情况下死守孤城，拒绝“让城别走”，导致太平天国的最后覆灭。", "④太平天国是以宗教来发动、组织群众的，但是，拜上帝教教义不仅不能正确指导斗争，而且给农民战争带来了危害。在太平天国后期，洪秀全甚至认为“天生真命主，不用兵而定太平一统”，梦想以虚幻的力量代替农民起义者自身的努力。", "③太平天国也未能正确地对待儒学。他们开始时把儒家经书笼统地斥之为“妖书”，后来虽主张将“四书”“五经”删改后加以利用，但原封不动地保留了儒学中的封建纲常伦理原则。太平天国的领袖们不承认不平等条约，这是很正确的。但他们不能把西方国家的侵略者与人民群众区别开来，而是笼统地把信奉天父上帝的西方人都视为“洋兄弟”，这说明他们对于西方资本主义侵略者还缺乏理性的认识。太平天国起义及其失败表明，在半殖民地半封建的中国，由于受阶级和时代的局限，农民阶级虽然具有强大的力量，但是不能担负起领导反帝反封建斗争取得胜利的重任，单纯的农民战争不可能完成争取民族独立和人民解放的历史任务。"], ["（1）洋务运动的性质洋务运动是清朝封建统治阶级中的地主阶级洋务派为了维护清朝的封建统治而进行的一场自救运动，既具有进步性，也具有落后的保守性。", "（2）洋务运动失败的原因", "①洋务运动具有封建性。洋务运动的指导思想是“中学为体，西学为用”，洋务误企医在不改变中国固有的制度与道德的前提下，以吸取西方近代生产技术为手段，来达到维护和巩固中国封建统治的目的，这就严重限制了洋务运动的发展。", "②洋务运动对外国具有依赖性。西方列强依据种种特权，从政治、经济等各方面加紧对中国的侵略和控制，它们并不希望中国真正富强起来，而洋务派却处处依赖外国，企图以此来达到自强求富的目的，无异于与虎谋皮。", "③洋务企业的管理具有腐朽性。洋务企业虽然具有一定的资本主义性质，但其管理却仍是封建衙门式的，企业内部充斥着营私舞弊、贪污中饱、挥霍浪费等腐败现象。", "（3）洋务运动失败的教训洋务运动的失败说明，在不触动封建专制统治、不摆脱外国资本-帝国主义的侵略与控制的前提下，谋求通过局部的改革来发展本国资本主义，达到自强求富的目的是行不通的。"], ["（1）戊戌维新运动的意义", "①戊戌维新运动是一次爱国救亡运动。维新派在民族危亡的关键时刻，高举救亡图存的旗帜，要求通过变法，发展资本主义，使中国走上富强之路。维新派的政治实践和思想理论，不仅贯穿着强烈的爱国主义精神，而且推动了中华民族的觉醒。主张君主立宪制取代君主专制制度。戊戌维新运动虽然未能成功地建立起资本主义的君主立宪制度。其颁布的促进民族资本主义发展的若干措施也未能生效，但在政治、经济等领域一定程度上冲击了封建制度。", "③戊戌维新运动也是一场思想启蒙运动。在维新运动期间，维新派通过组织学会、创办报刊、翻译西书、开办学堂，大力传播西方资产阶级的社会政治学说和自然科学知识，宣传自由平等、社会进化观念，批判封建君权和封建纲常伦理，开阔了人们的视野。解放了人们的思想。在维新派的推动下，文化界还形成了广泛的文化革新运动。", "④维新派在改革社会风俗习惯方面也提出了许多新的主张。比如，维新派主张革除吸食鸦片及妇女缠足等恶俗陋习，提出“剪辫易服”的主张，倡导讲文明、重卫生等。", "（2）戊戌维新运动失败的原因戊戌维新运动的失败，主要是由于维新派自身的局限和以慈禧太后为首的强大的守旧势力的反对。派的势力更是非常弱小，他们既没有严密的组织，也不掌握实权和军队，更没有去发动群众，只能将希望寄托在一个没有实权的皇帝身上，而以慈禧太后为首的反对变法的守旧势力却相当强大，新旧势力对比的差距预示者这场运动难以取胜。", "②维新派自身的局限性是这场运动失败的重要原因，具体表现在以下三个方面：不敢否定封建主义。他们在政治上不敢根本否定封建君主制度：在经济上虽然要求发展民族资本主义，却未触及封建主义的经济基础封建土地所有制：在思想上，他们虽然提倡学习西学，却仍要打着孔子的旗号，借古代圣贤之名“托古改制”。对帝国主义抱有幻想。他们虽然在大声疾呼救亡图存，却又幻想西方列强能帮助自已变法维新，结果却是处处碰壁。惧怕人民群众。维新派的活动基本上局限于官士大夫和知识分子的小圈子。他们不但脱离了人民群众，而且惧怕甚至仇视人民群众，因此，运动未能得到人民群众的支持。", "（3）戊戌维新运动失败的教训戊戌维新运动的失败，不但暴露了中国民族资产阶级的软弱性，同时也说明在半殖民地半封建的中国，企图通过统治者走自上而下的改良道路，是根本行不通的。要想争取国家的独立，民主、富强，就必须用革命的手段，推翻帝国主义与封建主义联合统治的半殖民地半封建的社会制度。戊戌维新的失败再次暴露出清朝统治樂团的腐朽与测周，这使一部分人放弃改良主张，开始走上革命的道路。"]], "3": [["1905年至1907年间，围绕中国究竟是采取革命手段还是改良方式这个问题，革命派和改良派开展了一场大论战，革命派在论战中论述了革命的必要性、正义性和进步性。", "（1）革命的必要性资产阶级革命派指出，清政府是帝国主义的“鹰犬”，因此爱国必须革命，只有通过革命，才能免“瓜分之祸”，获得民族独立和社会进步。人们在革命过程中所付出的努力，乃至作出的牺牲，是以换取历史的进步作为补偿的。", "（2）革命的正义性对于改良派提出的“中国国民恶劣”说，革命派针锋相对地指出，不是“国民恶劣”，面是“政府恶劣”，民主共和是大势所趋，人心所向，拯救中国与建设中国都必须取法乎上，直接推行民主制度。只有“兴民权改民主”才是中国的唯一出路。(3)革命的进步性有，在进行政治革命的同时实现社会革命，才能进免贫富不均等一系列社会问题的出现。"], ["在近代历史上，辛亥革命是中国人民为救亡图存、振兴中华而奋起革命的一个里程碑，它使中国发生了历史性的巨变，具有伟大的历史意义。", "（1）辛亥革命推翻了封建势力的政治代表、帝国主义在中国的代理人清王朝的统治，沉重打击了中外反动势力，使中国反动统治者在政治上乱了阵脚。在这以后，帝国主义和封建势力在中国再也不能建立起比较稳定的统治，从而为中国人民斗争的发展开辟了道路。", "（2）辛亥革命结束了中国两千多年封建社会的君主专制制度，建立了中国历史上第一个资产阶级共和政府，使民主共和的观念开始深入人心，并在中国形成了“敢有帝制自为者，天下共击之”的民主主义观念。正因为如此，当袁世凯、张动先后复辟帝制时，均受到了社会舆论的强烈遣责和人民程众的坚决反抗。", "（3）辛亥革命推动了中国人民的思想解放，自古以来，皇帝被看作至高无上、神圣不可侵犯的绝对权威，如今连皇帝都可以被打倒，那么还有什么陈腐的东西不可以被怀疑、不可以被抛弃？辛亥革命激发了人民的爱国热情和民族觉醒，打开了禁键思想进步的间门。", "（4）辛亥革命推动了中国的社会变革，促使中国的社会经济、思想习惯和社会风俗等方面发生了新的积极变化。南京临时政府成立后，以振兴实业为目标，设立实业部，先后颁布了一系列有利于工商业发展的政策和措施，以推动民族资本主义经济的发展，使随后的几年成了资本主义发展的“黄金时代”。革命政府还提倡社会新风，扫除旧时代的“风俗之害”，不仅改变了社会风气，也有助于人们的精神解放。"], ["（1）辛亥革命失败原因封建主义在军事实力、玫治经验及社会基确等方面，都大大超过革命派，这是其失败的客观原因：资产阶级革命派政治上的软润性和妥协性，是革命失败的主观原因。具体而言，辛亥革命失败的原因有以下几点：", "①客庭原因从根本上说，是因为在帝国主义时代，在半殖民地半封建的中国，资本主义的建国方案是行不通的。帝国主义决不容许中国建立一个独立、富强的资产阶级共和国，使得帝国主义丧失殖民利益、中国封建势力异常强大而且贪婪顾固，作为掌握政权的他们只想凭借手中的权力来掠夺，竭力的维护封建统治秩序，为此不情与帝国主义相勾结，出卖国家主权。总之，帝国主义与以袁世凯为代表的大地主大买办势力以及旧官僚、立宪派一起勾结起来，从外部和内部绞杀了这场革命。", "②主观原因从主观方面来说，辛亥革命的失败在于其领导者资产阶级革命派的较弱性和妥协性，中国民族资本主义先天不足后天失调，使得其本身存在着许多磊点和错误。具体分析如下：没有提出彻底的反帝反封建的革命纲领。同盟会反满，反君主政体，却放过了主要敌人—帝国主义列强，他们没有明确提出反帝的口号，因此在清帝退位后，就失去了前进的目标。他们不敢和外国资本主义进行正面斗争，幻想以妥协和退让来得到外国资本主义的同情和支持，结果革命却被外国资本主义所绞杀。他们只强调反演和建立共和政体，没有认识到必须反对封建地主阶级，致使一些汉族旧官僚、旧军官也混入革命的营垒，结果让袁世凯募夺了革命果实。不能充分发动和依靠人民群众。由于中国民族资产阶级同封建势力有千丝万缕的联系，因而不敢依靠反封建的主力军农民群众。他们利用会党、新军，却不发动广大农民。在革命的高潮时期，甚至镇压农民的反封建斗争。革命派没有形成统一的、坚强的领导核心。不能建立坚强的革命政党，作为团结一切革命力量的强有力的核心。月显会内部的组织比较松懈，萧系纷余，缺乏一个统一和稳定的领导核心。革命党人没有建立白已的革命武装，以推翻旧政府，保卫新政权。他们依靠的是清军士兵和民间秘密反清会党。武昌起义后，各地建立的民军，大部分是由原来的旧军和会党改编首成，领导权也掌握在立充派和旧管條手里", "（2）辛亥革命的教训", "①中国民族资产阶级革命注重上层，而轻视对下层民众，尤其是对广大工人、农民的争取，他们热衷于暗杀和论战，对武装力量的重视不够。另外，他们提出的革命纲领中并没有彻底的解决广大下层人民尤其是农民的土地问题，无法调动他们的革命热情，无法壮大资产阶级革命的力量，最终造成资产阶级革命的失败。", "②辛亥革命的失败，给中国的教训：中国民族资产阶级不可能彻底推翻外国列强和时建主义的反动统治，不可能独立领导中国革命取得胜利。半殖民地半封建的中国不能重走西方的老路，资产阶级共和国的教国方案，在中国是行不通的。", "③辛亥革命的失败，也给中国留下了一些启示：在20世纪初的中国，要想革命取得成功，必须具备以下条件：必须有一个彻底的反帝反封建的革命纲领。必须有坚强正确的革命政党。必须联合广大的农民，解决农民的土地问题。必须建立一支人民的革命军队。"]], "4": [["中国的先进分子选择马克思主义的思整旗帜，走上马克思主义指引的道路，是他们经过长期的、艰苦的探索之后的必然结果。", "（1）中国的先进分子选择马克思主义的原因", "①新文化运动的开展，在客观上为马克思主义在中国的传播创造了有利的条件。对民主和科学的张扬，对旧民主、旧文化、旧礼教的批判，在政泊上和思想上给子封建统治者前所未有的沉重打击。加速了中国人民的觉醒，促成了一场前所未有的启蒙运动和空前的思想解放运动。.否定了两千多年封建正统思想的权成，使人们政于独立思考问题、政于接受新思想，", "②在新文化运动中，先进知识分子开始对资产阶级民主主义产生怀疑，为先进知识分子接受马克思主义提供了土壤。在帝国主义时代，资本主义制度的内在矛盾已经比较充分地暴露出来。第一次世界大战以极端的形式进一步暴露了资本主义制度固有的不可克服的矛盾。中国人学习西方屡遭失败，给中国人民极大的刺激，从面对资本主义方案产生了更大的怀疑。", "③十月革命推动中国的先进分子从资产阶级民主主义转向社会主义。在十月革命以后，五四运动前后的中国思想界，产生了一批赞成俄国十月社会主义革命，具有初步共产主文思想的知识分子。十月革命启示人们：经济文化落后的国家可以用社会主义思想指导革命走向胜利。十月革命诞生的社会主义新俄国号召反对帝国主义，并以新的平等的态度对待中国，有力地推动了社会主义思想在中国的传播、.十月革命胜利的事实，给予中国的先进分子以新的革命方法的启示，推动他们去研究这个革命所遵循的主文。", "④五四运动促进了马克思主义在中国的传播及其与中国工人运动的结合。了马克思主义在中国的进一步传播，并同工人阶级结合，为中国共产党的成立准备了条件。", "（2）中国的先进分子选择马克思主义的路径", "①进行马克思主义思想运动a早期的马克思主义思想运动。为了适应中国社会发展和革命发展的需要，早期马克思主义者在中国掀起了一场研究、传播马克思主义的思想运动。对马克思主义基本理论的学习，初步形成了马克思主义应当与中国实际相结合的思想，开始提出知识分子应当同劳动群众相结合的思想。新文化运动。中国的先进分子在接受马克思主义之后，继承了五四运动的科学和民主的精神，并赋予它们以新的含文，使它们在更高的层次上得到了发扬。", "②将马克思主义与中国工人运动相结合中国共产党的早期组织进行了各项马克思主义与中国工人运动相结合的活动。马克思主义者到工人中去进行宣传和组织工作，进行了关于建党问题的讨论和实际组织工作，党的发起组制定了《中国共产党宣言》。成立了中国共产党。中国共产党一开始就是一个以马克思列宁主义理沦为基础的政党，是一个区别于第二国际旧式社会改良党的新型工人阶级革命政党。"], ["中国共产党的成立，是中华民族发展史上一个开天辟地的大事变。中国人民从来就勤劳勇收，富于斗争传统。他们的斗争之所以展遭挫折和失败，重要原因之一，是由于没有一个先进的坚强的政党作为凝聚自己力量的领导核心。自从有了中国共产党，这种局面就开始从根本上改变了。这主要体现在：", "（1）中国共产党的成立使中国革命有了坚强的领导核心，灾难深重的中国人民有了可以依赖的组织者和领导者，中国革命从此不断向前发展，由民主主义革命向社会主义革命推进。", "（2）中国共产党的成立，使中国革命有了科学的指导思想。中国共产党以马克思主义为指导思想，把马克思主义和中国革命的具体实践相结合，制定了正确的革命纲领和斗争策略，为中国人民指明了斗争的目标和走向胜利的道路。", "（3）中国共产党的成立，使中国革命有了新的革命方法，并沟通了中国革命和世界无产阶级革命之间的联系，为中国革命获得了广泛的国际握助以及避免走资本主义提供了客观可能性。", "（4）中国共产党的成立，使中国革命的面貌换然一新。", "①中国共产党提出了反帝反封建的民族民主革命钢额，为中国人民指出了明确的斗争目标：基本解决了革命的放友划分同题。", "②中国共产党发动工农群众开展革命斗争，在中国拟起了第一个工人运动的高潮，同时中国共产党也开始从事发动农民的工作，农民运动蓬缺发展：我到了发动群众这一正确的革命方法。", "③中国共产党实行国共合作，井在合作中发挥重要作用，批起了大革命高潮，推翻了北洋军阀的统治。3.什么是中国共产党人的初心和使命？为什么必须“不忘初心，牢记使命”了"], null, ["中国共产党成立后，立即投身于中国革命的洪流中，使中国革命呈现出新面貌，主要体现在以下几个方面：", "（1）中国共产党是在特定的社会历史条件下成立的，它的成立是一个“开天辟地的大事变”，使当时中国革命的前途焕然一新。", "①使中国革命有了坚强的领导核心，中国人民有了可依赖的组织者和领导者，保证了中国革命胜利的发展。", "②使中国革命有了马克思列宁主义科学的指导思想，并与中国实际相结合，为中国人民指明了斗争的目标和走问胜利的道路", "③使中国革命有了新的革命方法，并沟通了中国革命与世界革命的联系，为中国革命获得国际接助和建免走上资本主义提供了客观可能性。目标。", "（3）中国共产党成立后，发动工农群众开展革命斗争，在中国抵起了第一个工人运动的高潮，同时中国共产党也开始从事发动农民的工作，农民运动蓬勃发展。", "（4）中国共产党成立后，实行国共合作，并在其中发挥重要作用，撤起了大革命高满，推翻了北洋军阀的统治。"]], "5": [["以毛泽东为代表的中国共产党人在探索和开辟中国革命新道路上做了以下努力：", "（1）开展武装反抗国民党统治的斗争。", "①1927年8月，中共中央在汉口召开紧急会议，即八七会议，彻底清算了大革命后期的陈独秀右候机会主义错误，确定了土地革命和武装反抗国民党方针。", "②八七会议以后，举行了南昌起义、湘赣边界的秋收起义、广州起义，中国革命由此发展到了一个新阶段。", "（2）走农村包围城市的革命道路。以农村为重点，到农村去发动农民，进行土地革命，开展武装斗争，建设根据地，这是1927年以后中国革命发展的客观规律所要求的，也是人民的智慧。", "（3）毛泽东不仅在实践中首先把革命进攻的方向指向了农村，而且从理论上阐明了武装斗争的极端重要性和农村应当成为党的工作中心的思想。", "①1928年，毛泽东写了《中国的红色政权为什么能够存在？》《井冈山的斗争》等文章，明确指出以农业为主要经济的中国革命，以军事发动暴动，是一种特征：还科学闸明了共产党额导的土地革命、武装斗争与根据地建设这三者之间的辩证统一关系，", "②1930年，毛泽东在《星星之火，可以燎原》一文中指出：红军、游击队和红色区域的建立和发展，是半殖民地中国在无产阶级领导下的农民斗争的最高形式，是半殖民地农民斗争发展的必然结果，并且无疑是促进全国革余高湘的重要因素。", "（4）农村包围城市，武装夺取政权理论，是对1927年革命失败后中国共产党领导的红军和根据地斗争经验的科学概括。", "①它是以毛泽东为代表的中国共产党人同当时党内盛行的马克息主义教条化、把共产国际和苏联经验神圣化的错误倾向做坚决斗争基确上形成的。", "②农村包围城市、武装夺取政权理论的提出，标志着中国化马克思主义，即毛泽东思想的初步形成。", "（5）随着革命新道路的开辟，中国革命开始走向复兴。中国共产党领导的红军和根据地逐步发展起来，红军游击战争实际上已经成为中国革命的主要形式，农村根据地成为积蓄和锻炼革命力量的主要战略阵地。2.20世纪20年代后期、30年代前中期，中国共产党内为什么连续出现“左”顿错误？"], null, ["（1）长征的意义", "①长征为中国革命保存了有生力量，为党培养了一大批优秀的干部，中国共产党正是依掌这支队伍作基干，使革命力量逐步恢复、发展、壮大，直到取得全国的胜利。", "③红军的长征宣告了国民党反动派消灭中国共产党和红军的图谋彻底失败，宣告了中国共产党和红军肩负着民族希望胜利实现了北上抗日的战略转移，实现了中国共产党和中国革命事业从挫折走向胜利的伟大转折。", "（2）继承和发扬长征精神的原因", "①长征精神，就是把全国人民和中华民族的根本利益者得高于一切，坚信正文事业必然胜利的精神：就是为了教国教民，不怕任何跟难险阻，不借付出一切牺牲的精神：就是坚持独立自主、实事求是，一切从实际出发的精补：就是顾全大局、严守纪律、紧密团结的精神：就是紧紧依靠人民群众，患难与共、艰苦奋斗的精神。", "②伟大长征精神，是中国共产党人及其领导的人民军队革命风范的生动反映，是中华民族自强不总的民族品格的集中展示，是以爱国主义为核心的民族精神的最高体现。长征精神为中国革命不断胜利提供了强大精神动力。", "③中国的社会主义事业仍然处于初级阶段，仍然有很多困难，仍然会遇到很多问题，发扬长征精神，有助于我们克服这些困难，保持党的先进性，最终让中国的社会主义事业达到新的高度。中国共产党是如何总结历史经染、加强党的思想理论建设的？"], null], "6": [["中国抗日战争之所以是神圣的民旗解放战争，主要是因为：（1)从世界意义上看，世界反法西斯战争是人类历史上规模空前的战争，战火遍及亚洲、欧洲、非洲、大洋洲，中国的抗日战争是世界反法西斯战争的重要组成部分。是世界反法西斯战争的东方主战场。中国人民抗日战争的胜利，对世界各国夺取反法西斯战争胜利，维护世界和平的伟大事业产生了巨大影响。2)从战争的性质上看，抗日战争是平殖民地半封建的中国和帝国主义的日本之间在20世纪30年代展开的一个民族反对另一个民族侵略、压迫、双役的战争。中国是正文的、进步的反侵略战争，是得道的：日本是非正义的、野蜜的、侵略战争，是失道的。日本侵略者肆意践踏中国的大好河山，屠杀中国军民，强行掠夺中国劳工，跃蹦和推残妇女，进行细菌战和化学战，制造了南京大屠杀等一系列灭绝人性的惨案，犯下了令人发指的罪行，使源远流长的中华文明道到了惨重破坏，使中华民族蒙受了巨大损失。C3）从战争的结果上看，中国人民抗日战争，是近代以来中华民族反抗外敌入侵第一次取得完全胜利的民族解放战争。", "①中国人民彻底打败了日本侵略者，挥卫了中国的国家主权和领土完整，使中华民族避免遭受殖民奴役的尼运。", "②中国人民抗日战争的胜利，促进了中华民族的觉醒，成为中华民族走向复兴的转折点，正是在中国人民抗日战争胜利的基碑上，中国共产党领导中国人民取得了新民主主义革命的胜利。", "③中国人民抗日战争，弘扬了中华民族的伟大精神，人民空前团结起来，使中华民族换发出巨大凝聚力和旺盛生命力。"], ["经历了大革命的失败后，中共有了更适合中国国情的纲领，善于发动广大人民群众，实行全民族抗战，", "（1）以毛泽东为杰出代表的中国共产党人，把马克思列宁主义基本原理同中国革命具体实际相结合，创立和发展了毛泽东思想的科学理论。制定、实施了一套完整的抗战策略和方针，提出了持久战的战略思想，对抗日战争的胜利发挥了重要的思想和战略指导作用。", "（2）共产始终坚持全面抗战路线和持久战的方针，共产党强调要打倒帝国主义关键在于实行全国军事总动员，全国人民总动员，把抗日战争发展成全民族的抗战。最大限度地动员了全国军民共同抗战，成为凝聚全民族力量的杰出组织者和鼓舞者：全面抗战爆发后毛泽东针对各种舆论系统地闸述了抗日战争的特点、前途和发展规律，阐明了持久战的总方针，使全民嵌认清了抗日战争的性质和发展进程，对全国抗战起了积极作用。", "（3）开辟敌后战场，建立抗日根据地。全国抗战开始后，共产党领导的八路军，新四军进行了多次抗战，战场和共产党额导的敌后战场。共产党在敌后建立抗日根据地，采取开展游击战争，有力的打击了日军，牵制了日军战场的作战力下降，转入次妥位置，而敌后游击战则成为主要的抗日作最方式。共产党还在抗日根据地大力发展经济和文化建设，帮助根据地人民渡过难关。", "（4）击退国民党的反共摩擦，巩固和壮大抗日民族统一战线，全面抗战期间，国民党先后发起三次反共高潮，人民军队霍给子了坚决的反击，成功击退国民党。同时中国共产党坚持把中日矛盾放在首位，积极争取抗日合作。并制定了“发展进步势力，争取中间势力，孤立项固势力”的策略和方针，始终坚持抗日续一线线。中国共产党人以自己最富于括牲的爱国主义精神、不怕流血牺牲的模范行动，支撑起全民嵌救亡图存的希望，成为夺取抗战胜利的"], ["国民党政府在抗日战争中执行的路线和正面战场的地位和作用体现在以下几个方面：", "（1）国民党政府执行的是片面抗战路线，即不敢放手发动和武装形众，实行单纯的政府和正规军的抗战：在战略技术上，没有采取积极防御的方计。而是进行单纯的阵继防御战。这是由国民党政府的阶级本质和阶级利益所决定的，不仅使国民党正面战场节节失利，而且危害群众利益，使国民党政府孤立于人民群众之外。2)国民党领导的正面战场对抗日战争的胜利做出了重要责献，特别是在抗日成争初期的战略防御阶段，牵制和消耗了日本大量军力，为兵力的部署调道和人民群众的转移争取了宝贵的时间。G）国民党领导的正面战场在抗目战争中表现不同，其地位和作用也不同，抗战初期的战略防御阶段。国民党政依积极抗成，正面战场在整个抗成中起了重要作用。但由于其实行片面抗成路线，也逾受了巨大损失，特别是进入战略相持阶段后，国民党一面消极抗战，一面制造反共醇擦事件，其在抗战中的地位和作用明显下降。在战略反攻阶段，国民党虽然坚持抗战，但重点是在准备抢夺抗战胜利果实，对夺取抗战最后胜利的作用十分有限。"], null], "7": [["抗战胜利后，国民党陷入全民的包国并迅速走向崩清的原因有：", "（1）国民党政府实行专制独裁统治，官员们贪污腐化，在抗战后期就严重丧失民心。抗战胜利之际，国民党政府所派官员“劫收”论陷区，进一步丧失人心。", "（2）国民党政府在抗战胜利后违育全国人民迫切要求体养生息、和平建国的意愿，执行反人民的内战政策。为了筹措内战经费，向人民征收各种指税，发纸币，导致恶性通货膨账，工农业生产严重娄缩，人民生活困苦。", "（3）代表大地主、大资产阶级利益的国民党政府在抗战胜利后，拒绝全国人民要和平、要民主、要自由的那望，仍然进续并加强独裁统治。因此。国民党政府置自身于人民的对立面，丧失了人心，激起了全国人民的反抗从而陷入了全国的包围之中，并迅速走向别遗。", "（4）共产党代表中国最广大劳动人民的利益，坚决进行反对封建主义、帝国主义和官僚资本主义三座大山"], ["（1）民主党派的历史作用中国各民主党深的政纲不尽相同，但都主张爱国、反对卖国，主张民主、反对独载。在抗线中，他们对反抗日本帝国主义的侵略，特别是文化侵略，对国统区抗日民主运动的发展都起了积极作用。抗战胜利后，民主党派作为“第三方面”，主要与共产党一起，反对国民党的内战、独裁政策，为和平民主面奔走呼号，虽然有些党派后来跟着国民党走，但民翌等大多数民主党派人士是反对国民党一党独裁的，并与共产党一起为和平、民主、自由而斗争。此外，他们还积极参加和支持国民党统治区的爱国民主运动，有力地支握第二条战线的斗争，特别是在新中国成立前，同意接受共产党领导，参加人民政协，为新中国的成立和新民主主义革命的胜利微出了自己的贡献。", "（2）中国共产党额导的多党合作、政治协商格局的形成", "①各民主党派成立时，大多同中国共产党建立了不同程度的合作关系，并在斗争实践中逐步地发展了这种关系。无论是在举行国共谈判、召开政协会议期间，还是在解放战争的进行过程中，中国共产党都及时向各民主党派通报情况，认真听取它们的意见，并就一些重大问题同它们进行协商，以便采取一致行动。中共一贯效励和支持各民主党派反对国民党独裁统治的斗争。同时，又十分注壹尊重和维护其应有的政治地位和合理的利益。对于它们的某些不受当的意见。则善意地提出批评，诚是地帮助其进步。这使得中共与民主党谣的关系更加融洽，合作方式不渐发展、完善。", "②国民党政府坚持一党独裁，迫害民主党派进步人士，使得民主党派逐步转移到新民主主义革命的立场上，特别是1948年1月民盟公开表示与共产党携手合作。1949年1月民主党派和无党派民主人士联合发表（对时局的意见》，表示愿意接受中国共产党的领导，拥护建立人民民主的新中国。", "③中国共产党也邀请各民主党派“积极参政。共同建设新中国”，1949年9月，各民主党谣积极参加了中国人民政治协商会议。这标志着各民主党派正式接受了中国共产党领导和人民共和国，确认了社会主义的正确性。各民主党派世由在野党变成了人民民主专政的参政党，中国共产党额导的多党合作、政治协商制度在此基础上也基本形成。水利国中国中国中华："], null]};
const CN = ['零','一','二','三','四','五','六','七','八','九','十'];
const CH_KEYS = Object.keys(QUESTIONS).sort((a,b)=>a-b);
const palette = ['#a8272b','#c0622a','#9a7b27','#2f7d52','#1f7a86','#3f5aa6','#7a4aa0','#b03f78','#7a5230','#4a7a3a'];

const STORE = (function(){
  // Claude 站内预览环境提供 window.storage
  if(typeof window!=='undefined' && window.storage) return window.storage;
  // 本地浏览器：用 localStorage 适配相同的 get/set 接口，实现做题进度/错题本/Key 的缓存
  try{
    const t='__jdsh_test__'; localStorage.setItem(t,'1'); localStorage.removeItem(t);
    return {
      get:(k)=>{ const v=localStorage.getItem(k); return v==null?null:{value:v}; },
      set:(k,v)=>{ try{ localStorage.setItem(k,v); }catch(e){} }
    };
  }catch(e){ return null; } // 隐私模式等 localStorage 不可用时，降级为不缓存
})();
let state = { mode:'unit', chap:'1', list:[], pos:0 };
let answers = {};
let wrong = new Set();
let ai = { provider:'claude', dskey:'' };
let examAns={}; let seen=new Set();

function chName(k){ return '第'+CN[+k]+'章 '+CHAPTERS[k].title; }
function key(it){ return it.type==='essay' ? 'e-'+it.chap+'-'+it.ei : it.chap+'-'+it.qi; }
function letterIdx(L){ return {A:0,B:1,C:2,D:3}[L]; }
function cur(){ return state.list[state.pos]; }
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

/* ---------- persistence ---------- */
async function loadStore(){
  if(!STORE) return;
  try{ const a=await STORE.get('jdsh:answers'); if(a) answers=JSON.parse(a.value); }catch(e){}
  try{ const w=await STORE.get('jdsh:wrong'); if(w) wrong=new Set(JSON.parse(w.value)); }catch(e){}
  try{ const s=await STORE.get('jdsh:ai'); if(s){ai=JSON.parse(s.value);} }catch(e){}
}
async function save(){
  if(!STORE) return;
  try{ await STORE.set('jdsh:answers', JSON.stringify(answers), false); }catch(e){}
  try{ await STORE.set('jdsh:wrong', JSON.stringify([...wrong]), false); }catch(e){}
}
async function saveAI(){ if(STORE){ try{ await STORE.set('jdsh:ai', JSON.stringify(ai), false);}catch(e){} } }

/* ---------- list ---------- */
function buildList(){
  if(state.mode==='unit'){
    state.list = QUESTIONS[state.chap].map((d,qi)=>({type:'mcq',chap:state.chap, qi, data:d}));
  } else if(state.mode==='exam'){
    state.list = buildExam();
  } else {
    state.list = [];
    CH_KEYS.forEach(k=>QUESTIONS[k].forEach((d,qi)=>state.list.push({type:'mcq',chap:k,qi,data:d})));
  }
  state.pos = 0;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildExam(){
  const all=[]; CH_KEYS.forEach(k=>QUESTIONS[k].forEach((d,qi)=>all.push({type:'mcq',chap:k,qi,data:d})));
  const mcq=shuffle(all).slice(0,50);
  const es=[]; Object.keys(ESSAYS).forEach(k=>(ESSAYS[k]||[]).forEach((d,ei)=>es.push({type:'essay',chap:k,ei,data:d})));
  const ess=shuffle(es).slice(0,3);
  return mcq.concat(ess);
}
function newExam(){
  if(state.mode!=='exam'){ setMode('exam'); return; }
  examAns={}; seen=new Set(); state.list=buildExam(); state.pos=0; renderAll(); toast('已抽取新试卷（50 选择 + 3 思考）');
}
function shuffleList(){
  for(let i=state.list.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[state.list[i],state.list[j]]=[state.list[j],state.list[i]];}
  state.pos=0; renderAll();
}
function reviewWrong(){
  if(wrong.size===0){ toast('错题本是空的，先去做题吧'); return; }
  const items=[];
  CH_KEYS.forEach(k=>QUESTIONS[k].forEach((d,qi)=>{ if(wrong.has(k+'-'+qi)) items.push({type:'mcq',chap:k,qi,data:d}); }));
  state.list=items; state.pos=0; renderAll();
  toast('已载入 '+items.length+' 道错题');
}
function redoOne(){
  const it=cur(); if(!it) return;
  if(it.type==='essay'){ seen.delete(key(it)); renderQuiz(); return; }
  const store=(state.mode==='exam'?examAns:answers); delete store[key(it)];
  if(state.mode!=='exam') save();
  renderQuiz(); renderStats();
}
function redoSet(){
  if(!state.list.length) return;
  if(state.mode==='exam'){ examAns={}; seen=new Set(); state.pos=0; renderAll(); toast('本套已重置'); return; }
  state.list.forEach(it=>{ delete answers[key(it)]; });  // 只重置当前这一组，保留错题本
  state.pos=0; save(); renderAll();
  toast('本组已重置，可以再刷一遍');
}

function aGet(it){ return (state.mode==='exam'?examAns:answers)[key(it)]; }

function renderEssayItem(it){

function revealEssay(){ seen.add(key(cur())); renderQuiz(); }
function askEssayAI(){ openAI(); document.getElementById('chatbox').value='请详细讲解这道课后思考题并给出背诵要点：'+cur().data.q; }

function pick(L){
  const it=cur(); if(it.type==='essay') return;
  const store=(state.mode==='exam'?examAns:answers); const k=key(it);
  if(store[k]) return;
  store[k]=L;
  if(state.mode!=='exam'){ if(L!==it.data.a) wrong.add(k); else wrong.delete(k); save(); }
  renderQuiz(); renderStats();

function renderSheet(){

let svg,vp,baseG,mkG,arrG,pop,mapWrap;

function ptsToPath(arr,close){ let d=''; arr.forEach((p,i)=>{const a=proj(p[0],p[1]); d+=(i?'L':'M')+a[0].toFixed(1)+' '+a[1].toFixed(1);}); if(close)d+='Z'; return d; }

function initMap(){
  svg=document.getElementById('map'); mapWrap=document.getElementById('mapWrap'); pop=document.getElementById('mapPop');
  vp=document.getElementById('vp'); baseG=document.getElementById('baseG'); mkG=document.getElementById('mkG'); arrG=document.getElementById('arrG');
  drawBase(); bindMap(); mapInit=true;

function drawBase(){
  let h='';
  for(let lon=80;lon<=130;lon+=10){const a=proj(lon,GEO.lat1),b=proj(lon,GEO.lat0); h+='<line class="grat" x1="'+a[0].toFixed(1)+'" y1="'+a[1].toFixed(1)+'" x2="'+b[0].toFixed(1)+'" y2="'+b[1].toFixed(1)+'"/>';}
  for(let lat=20;lat<=50;lat+=10){const a=proj(GEO.lon0,lat),b=proj(GEO.lon1,lat); h+='<line class="grat" x1="'+a[0].toFixed(1)+'" y1="'+a[1].toFixed(1)+'" x2="'+b[0].toFixed(1)+'" y2="'+b[1].toFixed(1)+'"/>';}
  h+='<path class="land" d="'+ptsToPath(BORDER,true)+'"/>';
  h+='<path class="land" d="'+ptsToPath(TAIWAN,true)+'"/>';
  h+='<path class="land" d="'+ptsToPath(HAINAN,true)+'"/>';
  h+='<path class="river" d="'+ptsToPath(YELLOW,false)+'"/>';
  h+='<path class="river" d="'+ptsToPath(YANGTZE,false)+'"/>';
  SEAS.forEach(s=>{const a=proj(s[1],s[2]); h+='<text class="sea" x="'+a[0].toFixed(1)+'" y="'+a[1].toFixed(1)+'">'+s[0]+'</text>';});
  NEI.forEach(s=>{const a=proj(s[1],s[2]); h+='<text class="nei" x="'+a[0].toFixed(1)+'" y="'+a[1].toFixed(1)+'">'+s[0]+'</text>';});
  baseG.innerHTML=h;

function dnum(d){const m=String(d).match(/(\d{4})(?:\D(\d{1,2}))?(?:\D(\d{1,2}))?/); return m?(+m[1])*10000+(m[2]?+m[2]:0)*100+(m[3]?+m[3]:0):0;}
function groupGeo(list){
  const m=new Map();
  list.forEach(e=>{const k=e.lon+','+e.lat; if(!m.has(k))m.set(k,{lon:e.lon,lat:e.lat,place:e.place,events:[]}); m.get(k).events.push(e);});
  const arr=[...m.values()]; arr.forEach(g=>g.events.sort((a,b)=>dnum(a.d)-dnum(b.d))); return arr;
}
function allGeo(){ let a=[]; CH_KEYS.forEach(k=>(CHAPTERS[k].geo||[]).forEach(e=>a.push(Object.assign({chap:k},e)))); return a; }

let legendOff={};

function drawMarkers(){
  let h='';
  curGroups.forEach((g,gi)=>{
    const evs = (mapMode==='full') ? g.events.filter(e=>!legendOff[e.chap]) : g.events;
    if(!evs.length) return;

    const baseChap = (mapMode==='full') ? evs[0].chap : mapHi;
    const col = palette[(+baseChap-1)%palette.length];
    const faded = (mapMode==='full' && mapHi && !evs.some(e=>String(e.chap)===String(mapHi)));
    h+='<g class="mk'+(faded?' faded':'')+'" data-gi="'+gi+'" transform="translate('+a[0].toFixed(1)+' '+a[1].toFixed(1)+')">'+
       '<circle class="mkring" r="'+(8/ms).toFixed(2)+'" fill="'+col+'"/>'+
       '<circle class="mkdot" r="'+(4.6/ms).toFixed(2)+'" fill="'+col+'" stroke-width="'+(1/ms).toFixed(2)+'"/>'+
       (evs.length>1?'<text class="mkcount" y="'+(-9.5/ms).toFixed(2)+'" font-size="'+(9/ms).toFixed(2)+'">'+evs.length+'</text>':'')+
       '<text class="mklbl" x="'+(9/ms).toFixed(2)+'" y="'+(3.6/ms).toFixed(2)+'" font-size="'+(11/ms).toFixed(2)+'" stroke-width="'+(2.4/ms).toFixed(2)+'">'+esc(g.place)+'</text>'+
       '</g>';
  });
  mkG.innerHTML=h;
  mkG.querySelectorAll('.mk').forEach(el=>el.addEventListener('click',ev=>{ ev.stopPropagation(); openPop(+el.dataset.gi, el); }));

function drawArrows(){
  if(!showArrows){ arrG.innerHTML=''; return; }
  let flat=[...curGeo];
  if(mapMode==='full') flat=flat.filter(e=>!legendOff[e.chap]);
  flat.sort((a,b)=>dnum(a.d)-dnum(b.d));
  let h='', prev=null;
  flat.forEach(e=>{
    if(prev && (prev.lon!==e.lon||prev.lat!==e.lat)){
      const p1=proj(prev.lon,prev.lat), p2=proj(e.lon,e.lat);
      h+=arrowSeg(p1[0],p1[1],p2[0],p2[1]);
    }
    prev=e;
  });
  arrG.innerHTML=h;
}
function arrowSeg(x1,y1,x2,y2){
  const ang=Math.atan2(y2-y1,x2-x1);
  const pad=6/ms, ah=7/ms;
  const sx=x1+Math.cos(ang)*pad, sy=y1+Math.sin(ang)*pad;
  const ex=x2-Math.cos(ang)*pad, ey=y2-Math.sin(ang)*pad;
  const a1x=ex-Math.cos(ang-0.42)*ah, a1y=ey-Math.sin(ang-0.42)*ah;
  const a2x=ex-Math.cos(ang+0.42)*ah, a2y=ey-Math.sin(ang+0.42)*ah;
  return '<line class="arr" x1="'+sx.toFixed(1)+'" y1="'+sy.toFixed(1)+'" x2="'+ex.toFixed(1)+'" y2="'+ey.toFixed(1)+'" stroke-width="'+(1.8/ms).toFixed(2)+'"/>'+
         '<polygon class="arrh" points="'+ex.toFixed(1)+','+ey.toFixed(1)+' '+a1x.toFixed(1)+','+a1y.toFixed(1)+' '+a2x.toFixed(1)+','+a2y.toFixed(1)+'"/>';
}
function openPop(gi, el){
  const g=curGroups[gi];
  let evs = (mapMode==='full') ? g.events.filter(e=>!legendOff[e.chap]) : g.events;
  let html='<div class="pop-h"><b>'+esc(g.place)+'</b><button class="pop-x" onclick="closePop()">✕</button></div><div class="pop-b">';
  evs.forEach(e=>{ const cc=palette[(+e.chap-1)%palette.length];
    html+='<div class="pop-ev"><span class="pop-d" style="background:'+cc+'">'+esc(e.d)+'</span><div><div class="pop-t">'+esc(e.t)+(mapMode==='full'?'<i class="pop-ch">第'+CN[+e.chap]+'章</i>':'')+'</div><div class="pop-x2">'+esc(e.x)+'</div></div></div>';
  });
  html+='</div>'; pop.innerHTML=html; pop.className='map-pop show';
  const wrap=mapWrap.getBoundingClientRect(), r=el.getBoundingClientRect();
  let left=r.left-wrap.left+14, top=r.top-wrap.top+10;
  const pw=Math.min(248, wrap.width*0.84), ph=pop.offsetHeight||220;
  if(left+pw>wrap.width-8) left=Math.max(8, r.left-wrap.left-pw-10);
  if(top+ph>wrap.height-8) top=Math.max(8, wrap.height-ph-8);
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
function closePop(){ if(pop){ pop.className='map-pop'; } }
function toggleArrows(){
  showArrows=!showArrows;
  const b=document.getElementById('tlBtn'); b.textContent=showArrows?'隐藏时间线':'显示时间线'; b.classList.toggle('on',showArrows);
  drawArrows();
}

/* ---- pan / zoom ---- */
function applyTransform(){
  if(!vp) return;
  vp.setAttribute('transform','translate('+mtx+' '+mty+') scale('+ms+')');
  if(ms!==lastMs){ drawMarkers(); drawArrows(); lastMs=ms; }
}
function toSvg(cx,cy){ const m=svg.getScreenCTM(); if(!m||!m.a) return {x:0,y:0}; return {x:(cx-m.e)/m.a, y:(cy-m.f)/m.d}; }
function clampS(v){ return Math.max(0.7, Math.min(9, v)); }
function zoomAt(cx,cy,f){ const c=toSvg(cx,cy); let ns=clampS(ms*f); f=ns/ms; mtx=c.x-(c.x-mtx)*f; mty=c.y-(c.y-mty)*f; ms=ns; applyTransform(); }
function zoomBy(f){ const r=mapWrap.getBoundingClientRect(); zoomAt(r.left+r.width/2, r.top+r.height/2, f); }
function mapReset(){ ms=1; mtx=0; mty=0; applyTransform(); }
function bindMap(){
  const ptrs=new Map();
  svg.addEventListener('wheel',e=>{ e.preventDefault(); zoomAt(e.clientX,e.clientY, e.deltaY<0?1.16:0.86); },{passive:false});
  svg.addEventListener('pointerdown',e=>{ try{svg.setPointerCapture(e.pointerId);}catch(_){} ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY}); });
  svg.addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId)) return;
    const prev=ptrs.get(e.pointerId);
    if(ptrs.size===1){
      const a=toSvg(prev.x,prev.y), b=toSvg(e.clientX,e.clientY);
      mtx+=b.x-a.x; mty+=b.y-a.y; applyTransform();
    } else if(ptrs.size===2){
      const ids=[...ptrs.keys()]; const oid=ids.find(i=>i!==e.pointerId); const o=ptrs.get(oid);
      const pMid={x:(prev.x+o.x)/2,y:(prev.y+o.y)/2}, pD=Math.hypot(prev.x-o.x,prev.y-o.y);
      const cMid={x:(e.clientX+o.x)/2,y:(e.clientY+o.y)/2}, cD=Math.hypot(e.clientX-o.x,e.clientY-o.y);
      if(pD>0) zoomAt(cMid.x,cMid.y, cD/pD);
      const a=toSvg(pMid.x,pMid.y), b=toSvg(cMid.x,cMid.y); mtx+=b.x-a.x; mty+=b.y-a.y; applyTransform();
    }
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>svg.addEventListener(ev,e=>{ ptrs.delete(e.pointerId); }));
  svg.addEventListener('click',()=>closePop());
}

/* ---------- mode / chapter ---------- */
function setMode(m){
  state.mode=m;
  document.getElementById('mUnit').classList.toggle('on',m==='unit');
  document.getElementById('mFull').classList.toggle('on',m==='full');
  document.getElementById('mExam').classList.toggle('on',m==='exam');
  document.getElementById('chapSel').style.display = m==='unit'?'':'none';
  document.getElementById('newExamBtn').style.display = m==='exam'?'':'none';
  if(m==='exam'){ examAns={}; seen=new Set(); }
  lastMapChap=null; buildList(); renderAll();
}
function onChapChange(){ state.chap=document.getElementById('chapSel').value; lastMapChap=null; buildList(); renderAll(); }
function resetProgress(){
  if(!confirm('确定清空所有作答记录和错题本？')) return;
  answers={}; wrong=new Set(); save(); buildList(); renderAll(); toast('已清空');
}

/* ---------- AI ---------- */
function openAI(){ document.getElementById('drawer').classList.add('open'); document.getElementById('scrim').classList.add('on'); }
function closeAI(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('scrim').classList.remove('on'); }
function setProvider(p){
  ai.provider=p;
  document.getElementById('pvClaude').classList.toggle('on',p==='claude');
  document.getElementById('pvDS').classList.toggle('on',p==='deepseek');
  document.getElementById('keyrow').classList.toggle('show',p==='deepseek');
  saveAI();
}
function saveKey(){ ai.dskey=document.getElementById('dskey').value.trim(); saveAI(); }
function curChapCtx(){
  const it=cur(); const c=CHAPTERS[it.chap];
  const kp=(c.knowledge||[]).map(s=>s.h+'：'+s.p.join('')).join('\n');
  const pe=(c.people||[]).map(p=>p.n+'—'+p.r).join('；');
  const tl=(c.timeline||[]).map(e=>e.d+' '+e.t).join('；');
  const es=(ESSAYS[it.chap]||[]).map(e=>e.q).join('；');
  return '【当前章节：第'+CN[+it.chap]+'章 '+c.title+'】\n知识点：\n'+kp+'\n人物事件：'+pe+'\n时间线：'+tl+(es?'\n课后思考题：'+es:'');
}
async function callAI(userText, system){
  if(ai.provider==='deepseek'){
    if(!ai.dskey) throw new Error('请先在上方填写 DeepSeek API Key');
    const r=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.dskey},
      body:JSON.stringify({model:'deepseek-chat', messages:[{role:'system',content:system},{role:'user',content:userText}], max_tokens:1200, temperature:0.4})
    });
    if(!r.ok){ const t=await r.text(); throw new Error('DeepSeek 返回 '+r.status+'：'+t.slice(0,160)); }
    const d=await r.json(); return d.choices[0].message.content;
  }else{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200, system:system, messages:[{role:'user',content:userText}]})
    });
    if(!r.ok){ const t=await r.text(); throw new Error('请求失败 '+r.status+'：'+t.slice(0,160)); }
    const d=await r.json(); return (d.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim();
  }
}
const SYS_TUTOR='你是一位中国近现代史纲要的考试辅导老师。回答准确、简洁、紧扣考点，使用中文，可分点。不要编造史实。';
async function aiHint(){
  const it=cur(); const d=it.data; const box=document.getElementById('hintOut');
  box.className='hint-out show load'; box.textContent='AI 正在想提示…';
  const q='这是一道中国近现代史单选题。请只给“解题提示/思路引导”，绝对不要直接说出答案或正确选项字母，也不要说“排除某项后剩下的就是答案”。\n题目：'+d.q+'\nA.'+d.o[0]+' B.'+d.o[1]+' C.'+d.o[2]+' D.'+d.o[3]+'\n请用1-3条提示，引导我回忆相关史实、人物或时间，60字以内。';
  try{ const t=await callAI(q, SYS_TUTOR+'\n'+curChapCtx()); box.className='hint-out show'; box.textContent='💡 '+t; }
  catch(e){ box.className='hint-out show'; box.textContent='⚠ '+e.message; }
}
async function aiExplain(){
  const it=cur(); const d=it.data;
  const out=document.getElementById('aiOut'); const btn=document.getElementById('aiExpBtn');
  out.className='ai-out show load'; out.textContent='AI 正在生成解析…'; btn.disabled=true;
  const q='请解析这道单选题（已知正确答案是 '+d.a+'）：\n题目：'+d.q+'\nA. '+d.o[0]+'\nB. '+d.o[1]+'\nC. '+d.o[2]+'\nD. '+d.o[3]+'\n\n要求：1) 一句话点明为什么选 '+d.a+'；2) 简述相关史实背景；3) 指出其他迷惑项为何不对。控制在180字内。';
  try{ const t=await callAI(q, SYS_TUTOR+'\n'+curChapCtx()); out.className='ai-out show'; out.textContent=t; }
  catch(e){ out.className='ai-out show'; out.textContent='⚠ '+e.message+'\n\n（若用 DeepSeek 且被浏览器拦截，请把本页下载到本地后再用。）'; }
  btn.disabled=false;
}
function askAiAbout(){ const it=cur(); openAI(); document.getElementById('chatbox').value='就上面这道题，帮我讲清楚相关考点：'+it.data.q; }
function pushMsg(role,text){ const log=document.getElementById('chatlog'); const m=document.createElement('div'); m.className='msg '+role; m.textContent=text; log.appendChild(m); log.scrollTop=log.scrollHeight; return m; }
function quick(t){ document.getElementById('chatbox').value=t; sendChat(); }
function chatKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();} }
async function sendChat(){
  const box=document.getElementById('chatbox'); const text=box.value.trim(); if(!text) return;
  box.value=''; pushMsg('u',text); const m=pushMsg('a','思考中…');
  try{ const t=await callAI(text, SYS_TUTOR+'\n'+curChapCtx()+'\n（学生正在复习，请结合当前章节作答。）'); m.textContent=t; }
  catch(e){ m.textContent='⚠ '+e.message; }
  document.getElementById('chatlog').scrollTop=1e9;
}

/* ---------- util ---------- */
let toastT;
function toast(msg){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:60;box-shadow:0 10px 30px -12px #000a;font-family:var(--serif);transition:opacity .3s';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastT); toastT=setTimeout(()=>t.style.opacity='0',1800);
}

(async function(){
  const sel=document.getElementById('chapSel');
  CH_KEYS.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=chName(k)+'（'+QUESTIONS[k].length+'题）';sel.appendChild(o);});

  if(ai.dskey) document.getElementById('dskey').value=ai.dskey;

  buildList(); renderAll();
  pushMsg('sys','我可以解析任意一道题、做人物事件对照、梳理时间线，或就当前章节出题考你。');
})();
